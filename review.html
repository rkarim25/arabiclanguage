<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d7a5f">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Daily Review — Arabic Through Stories</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=mros787r">
</head>
<body>
<main>
  <h1>Daily Review <span class="arabic" style="color:var(--accent)">المُرَاجَعَة اليَوْمِيَّة</span></h1>
  <p class="sub">Words come back on a spaced schedule. Look at the Arabic, recall the meaning, reveal, and mark only what you missed — missed words return sooner.</p>
  <div class="card" id="reviewCard">
    <div id="reviewArea">Loading…</div>
  </div>
</main>

<script src="js/app.js?v=mros787r"></script>
<script src="js/tracker.js?v=mros787r"></script>
<script>
renderNav("review");
trackPage("review");

const area = document.getElementById("reviewArea");

async function init() {
  const due = dueCards(); // keys like "story-01:5"
  if (due.length === 0) {
    const t = totalCards();
    area.innerHTML = t === 0
      ? `<p>Your deck is empty. Do a round of <a href="vocab.html?sheet=1">Vocab Learn</a> or study a <a href="index.html">story</a> — every word you meet appears here on a spaced schedule.</p>`
      : `<p style="font-size:18px">✅ Nothing due right now — all ${t} words are scheduled. Want more anyway? <a href="vocab.html?sheet=1">Vocab Learn</a> always has the next most-useful words.</p>`;
    return;
  }

  const queue = (await resolveCards(due)).sort(() => 0.5 - Math.random());

  renderTable(queue);
}

/* ---------- table review (default): reveal, mark only misses ---------- */
function renderTable(queue) {
  area.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:12px">
      <strong>${queue.length} word${queue.length > 1 ? "s" : ""} due</strong>
      <div style="display:flex;gap:8px">
        <button class="small" id="revealAll">Reveal all</button>
        <button class="small" id="cardMode">card mode</button>
      </div>
    </div>
    <div class="toggles"><label><input type="checkbox" id="tgTr"> Transliteration</label></div>
    <div class="vocab-table-wrap">
      <table class="vocab-table">
        <thead><tr><th class="ar-col" style="text-align:right">Arabic</th><th></th><th>Transliteration</th><th>English</th></tr></thead>
        <tbody id="rvBody"></tbody>
      </table>
    </div>
    <div class="ex-row" style="margin-top:16px">
      <button class="primary" id="finish">✓ Finish — I knew everything except the marked ones</button>
    </div>
    <p style="font-size:13px;color:var(--muted)">Tap a row to reveal its English. <strong style="color:var(--red)">✗ missed</strong> = got it wrong this time (it comes back within minutes). Or set a bucket directly: ✓ know · ↻ repeat soon · ⏳ much later · ✗ don't repeat. 💡 = memory hook.</p>
  `;
  const tbody = document.getElementById("rvBody");
  const missed = new Set();
  const bucketed = new Set(); // an explicit bucket is the user's final say — Finish must not regrade it

  queue.forEach(({ key, v }) => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="ar-cell">${v.ar}</td>
      <td><span class="row-speak" title="hear it">🔊</span></td>
      <td class="tr-cell" style="visibility:hidden">${v.tr || ""}</td>
      <td class="en-cell veiled"><span>${v.en}${v.note ? `<span class="note-inline">${v.note}</span>` : ""}</span></td>
    `;
    tr.querySelector(".row-speak").onclick = (e) => { e.stopPropagation(); speak(v.ar, 0.8); };
    const enCell = tr.querySelector(".en-cell");
    tr.onclick = () => enCell.classList.remove("veiled");
    tbody.appendChild(tr);
    mountMnem(tr, tr.querySelector(".row-speak").parentElement, v.ar, key);

    // control strip — its own full-width row so nothing hides off-screen on a phone
    const ctr = document.createElement("tr");
    const td = document.createElement("td");
    td.colSpan = 4; td.className = "rv-ctrl";
    const missBtn = document.createElement("button");
    missBtn.type = "button"; missBtn.className = "small miss"; missBtn.textContent = "✗ missed";
    missBtn.onclick = (e) => {
      e.stopPropagation();
      enCell.classList.remove("veiled");
      if (missed.has(key)) { missed.delete(key); missBtn.classList.remove("on"); }
      else { missed.add(key); missBtn.classList.add("on"); }
    };
    td.appendChild(missBtn);
    const slot = document.createElement("div");
    slot.className = "bucket-slot";
    td.appendChild(slot);
    ctr.appendChild(td);
    tbody.appendChild(ctr);
    mountBucketBar(slot, key, () => { bucketed.add(key); missed.delete(key); missBtn.classList.remove("on"); });
  });

  document.getElementById("tgTr").onchange = (e) => {
    [...tbody.querySelectorAll(".tr-cell")].forEach(c => c.style.visibility = e.target.checked ? "visible" : "hidden");
  };
  document.getElementById("revealAll").onclick = () => {
    [...tbody.querySelectorAll(".en-cell")].forEach(c => c.classList.remove("veiled"));
  };
  document.getElementById("cardMode").onclick = () => renderCards(queue);
  document.getElementById("finish").onclick = () => {
    queue.forEach(({ key }) => {
      if (bucketed.has(key)) return; // the bucket already scheduled it
      const g = missed.has(key) ? "again" : "good";
      gradeCard(key, g);
      logEvent({ e: "review", card: key, g, src: "table" });
    });
    area.innerHTML = `<p style="font-size:18px">🎉 Review complete — ${queue.length} words done, ${missed.size} to revisit. <span class="arabic">أَحْسَنْت!</span></p>
      <a href="index.html"><button class="primary" style="margin-top:8px">Back to stories</button></a>`;
    autoSync();
  };
}

/* ---------- card mode (optional) ---------- */
function renderCards(queue) {
  let pos = 0, again = [];
  area.innerHTML = `<div class="flash-wrap">
    <div style="text-align:right"><button class="small" id="tableMode">back to table</button></div>
    <div class="flash-count" id="flashCount"></div>
    <div id="flashArea"></div>
  </div>`;
  document.getElementById("tableMode").onclick = () => renderTable(queue.slice(pos).concat(again));
  const flashArea = document.getElementById("flashArea");
  const count = document.getElementById("flashCount");

  function show() {
    if (pos >= queue.length) {
      if (again.length) { queue.push(...again.splice(0)); show(); return; }
      count.textContent = "";
      flashArea.innerHTML = `<p style="font-size:18px">🎉 Review complete. <span class="arabic">أَحْسَنْت!</span></p>
        <a href="index.html"><button class="primary" style="margin-top:8px">Back to stories</button></a>`;
      autoSync();
      return;
    }
    const { key, v } = queue[pos];
    count.textContent = `${pos + 1} / ${queue.length}` + (again.length ? ` (+${again.length} to retry)` : "");
    const mn = mnemFor(v.ar);
    flashArea.innerHTML = `
      <div class="flashcard" id="card">
        <div class="front">${v.ar}</div>
        <div class="back" id="back" style="display:none">${v.en}${v.tr ? `<div style="color:var(--muted);font-style:italic;font-size:15px">${v.tr}</div>` : ""}${v.note ? `<div class="note">${v.note}</div>` : ""}${mn ? `<div class="mnem-cell" style="text-align:left;direction:ltr">💡 ${mn}</div>` : ""}</div>
        <div class="hint" id="hint">tap to reveal · 🔊 to hear</div>
      </div>
      <div class="ex-row" style="justify-content:center;margin-bottom:14px">
        <button class="small" id="hear">🔊 Hear it</button>
      </div>
      <div class="grade-row" id="grades" style="visibility:hidden">
        <button class="again">✗ Again</button>
        <button class="good">✓ Good</button>
        <button class="easy">✓✓ Easy</button>
      </div>
    `;
    let revealedAt = 0;
    document.getElementById("card").onclick = () => {
      revealedAt = Date.now();
      document.getElementById("back").style.display = "block";
      document.getElementById("hint").style.display = "none";
      document.getElementById("grades").style.visibility = "visible";
    };
    document.getElementById("hear").onclick = (e) => { e.stopPropagation(); speak(v.ar, 0.8); };
    const grade = (g) => {
      gradeCard(key, g);
      logEvent({ e: "review", card: key, g, ms: revealedAt ? Date.now() - revealedAt : null, src: "review" });
      if (g === "again") again.push({ key, v });
      pos++;
      show();
    };
    flashArea.querySelector(".again").onclick = () => grade("again");
    flashArea.querySelector(".good").onclick = () => grade("good");
    flashArea.querySelector(".easy").onclick = () => grade("easy");
  }
  show();
}

init();
</script>
</body>
</html>
