<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d7a5f">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Vocab Lab — Arabic Through Stories</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=mrl3r7nz">
  <style>
    .fam-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
    .fam-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 16px; cursor: pointer; transition: transform .12s;
    }
    .fam-card:hover { transform: translateY(-2px); border-color: var(--accent); }
    .fam-card .root { font-family: var(--font-ar); font-size: 30px; color: var(--accent); direction: rtl; }
    .fam-card .theme { font-size: 12.5px; color: var(--muted); margin-top: 4px; }
    .fam-card .meta { font-size: 12px; color: var(--muted); margin-top: 8px; }
    .verse-card {
      background: #f6f2ea; border: 1px solid var(--border); border-radius: 12px;
      padding: 14px 16px; margin-top: 10px;
    }
    .verse-card .v-ar { direction: rtl; text-align: right; font-family: var(--font-ar); font-size: 26px; line-height: 2; }
    .verse-card .v-en { font-size: 13.5px; color: var(--muted); margin-top: 4px; }
    .verse-card .v-ref { font-size: 12px; color: var(--amber); font-weight: 600; }
    .fill-input {
      direction: rtl; text-align: right; font-family: var(--font-ar); font-size: 22px;
      border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; width: 180px;
      background: #fffdf9;
    }
    .fill-input:focus { outline: 2px solid var(--accent-soft); border-color: var(--accent); }
    .correct-answer { font-family: var(--font-ar); font-size: 20px; color: var(--accent); direction: rtl; display: block; }
    #kbDock { position: sticky; bottom: 0; background: var(--bg); padding: 8px 0; }
    .bucket-bar { display: inline-flex; gap: 3px; margin-top: 4px; direction: ltr; }
    .bucket-bar button { font-size: 12px; padding: 1px 8px; border-radius: 999px; color: var(--muted); }
    .bucket-bar button.sel { background: var(--accent); border-color: var(--accent); color: #fff; }
    .bucket-bar button.sel.never { background: var(--red); border-color: var(--red); }
    .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .chips button { border-radius: 999px; font-size: 13px; padding: 5px 12px; }
    .chips button.sel { background: var(--accent); border-color: var(--accent); color: #fff; }
    .show-btn { color: var(--muted); }
    .mnem-btn { cursor: pointer; user-select: none; }
    .mnem-cell { background: var(--amber-soft, #fff8e1); border-radius: 8px; padding: 7px 11px; font-size: 13px; color: var(--ink); line-height: 1.55; margin-top: 5px; }
    @media (prefers-color-scheme: dark) { .mnem-cell { background: rgba(253,224,71,.12); } }
    .drill-stage { text-align: center; padding: 20px 0; }
    .drill-stage .d-en { font-size: 22px; font-weight: 600; margin-bottom: 14px; }
    .drill-stage .d-note { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
    .drill-fb { min-height: 56px; margin-top: 12px; font-size: 15px; }
    @media (max-width: 600px) { .fill-input { width: 100%; } }
  </style>
</head>
<body>
<main>
  <div id="content">Loading…</div>
  <div id="kbDock"></div>
</main>

<script src="js/app.js?v=mrl3r7nz"></script>
<script src="js/tracker.js?v=mrl3r7nz"></script>
<script>
renderNav(new URLSearchParams(location.search).get("view") === "lessons" ? "lessons" : "vocab");

const content = document.getElementById("content");
let FAMS = null, CORE = null, EV = null, VERSES = null;
let labView = "learn";

/* Mnemonics (💡) — optional memory hooks, only the strong ones exist (many words
   have none, by design). Keyed by normalized/al-stripped Arabic; falls back to the
   first word so a phrase like "أَذانُ الفَجْر" still finds the أذان hook. */
let MNEM = {};
fetch("data/mnemonics.json").then(r => r.json()).then(d => { MNEM = d; }).catch(() => {});
function mnemKey(ar) { return normalizeAr(ar || "").replace(/^ال/, ""); }
function mnemFor(ar) { if (!ar) return null; return MNEM[mnemKey(ar)] || MNEM[mnemKey(ar.split(/\s+/)[0])] || null; }
/* Put a 💡 in btnHost and a hidden full-width hook row right after tr.
   Call AFTER tr is in the DOM. No-op for words without a hook. */
function mountMnem(tr, btnHost, ar, key) {
  const mn = mnemFor(ar);
  if (!mn || !btnHost) return;
  const b = document.createElement("span");
  b.className = "mnem-btn"; b.title = "memory hook"; b.textContent = " 💡";
  btnHost.appendChild(b);
  const mrow = document.createElement("tr"); mrow.style.display = "none";
  const cell = document.createElement("td"); cell.colSpan = tr.children.length;
  const box = document.createElement("div"); box.className = "mnem-cell"; box.textContent = "💡 " + mn;
  cell.appendChild(box); mrow.appendChild(cell);
  tr.after(mrow);
  b.onclick = e => {
    e.stopPropagation();
    mrow.style.display = mrow.style.display === "none" ? "table-row" : "none";
    if (mrow.style.display !== "none") logEvent({ e: "mnem", key: key || stripTashkeel(ar) });
  };
}

Promise.all([
  fetch("data/families.json").then(r => r.json()),
  fetch("data/quran-core.json").then(r => r.json()),
  fetch("data/everyday.json").then(r => r.json()),
  fetch("data/verses.json").then(r => r.json()),
]).then(([f, c, e, v]) => {
  FAMS = f.families;
  CORE = c.words;
  EV = e.groups;
  VERSES = v.surahs;
  const params = new URLSearchParams(location.search);
  const fam = FAMS.find(x => x.id === params.get("fam"));
  const ev = EV.find(x => x.id === params.get("ev"));
  if (fam) renderGroup(fam, params.get("mode") || "study", "fam-");
  else if (ev) renderGroup(ev, params.get("mode") || "study", "ev-");
  else if (params.get("today")) startToday(0);
  else renderList(params.get("view") || "learn");
});

/* ================= one-button day =================
   "Start my 5 minutes": due review → a few new words → an ears round.
   Zero decisions — the sequence is picked automatically and just stops. */
let TODAY = null;
const TODAY_STAGES = [
  { id: "review", label: "Review what's due", mode: "understand" },
  { id: "new", label: "A few new words", mode: "understand" },
  { id: "ears", label: "Ears round", mode: "ears" },
];
async function buildTodayPool(stageId) {
  if (stageId === "review") {
    return (await resolveCards(dueCards().slice(0, 10))).map(x => ({ ...x, isNew: false }));
  }
  if (stageId === "new") {
    const all = await buildPool();
    return all.filter(x => x.isNew).slice(0, 5);
  }
  const srs = getSrs();
  const keys = Object.keys(srs).filter(k => srs[k].box >= 1 && srs[k].b !== "never")
    .sort(() => 0.5 - Math.random()).slice(0, 5);
  return (await resolveCards(keys)).map(x => ({ ...x, isNew: false }));
}
async function startToday(stage) {
  TODAY = { stage };
  const st = TODAY_STAGES[stage];
  if (st.id === "ears" && !hasArabicVoice()) return finishToday(); // no voice — end gracefully
  const p = await buildTodayPool(st.id);
  if (!p.length) {
    if (stage < TODAY_STAGES.length - 1) return startToday(stage + 1);
    return finishToday();
  }
  sheetMode = st.mode;
  pool = p; poolPos = 0; sheetItems = null;
  poolLabel = `▶ Today, step ${stage + 1} of ${TODAY_STAGES.length} — ${st.label}`;
  renderList("learn");
  window.scrollTo({ top: 0 });
}
function finishToday() {
  TODAY = null;
  logEvent({ e: "today-done" });
  autoSync();
  renderList("learn");
  const area = document.getElementById("sheetArea");
  if (area) area.innerHTML = `
    <p style="font-size:20px;font-weight:700">🕌 That's your five minutes — done. <span class="arabic">أَحْسَنْت!</span></p>
    <p style="color:var(--muted)">Same again after the next salah. Every round like this pulls every milestone date closer.</p>
    <div class="ex-row">
      <a href="index.html"><button class="primary">Back to the dashboard</button></a>
      <a href="vocab.html?view=learn"><button>Keep going anyway</button></a>
    </div>`;
}

function groupDone(prefix, id) { return !!stepsDone(prefix + id).fill; }

/* ================= tabbed Vocab Lab ================= */
const LAB_TABS = [
  ["learn", "📝 Learn"],
  ["lessons", "🎓 Lessons"],
  ["roots", "🌿 Roots"],
  ["everyday", "🗣 Everyday"],
  ["core", "📖 Core"],
  ["browse", "🗂 Browse"],
];

function renderList(view) {
  labView = view || labView;
  trackPage("vocab:" + labView);
  content.innerHTML = `
    <h1>Vocab Lab <span class="arabic" style="color:var(--accent)">مُخْتَبَر المُفْرَدَات</span></h1>
    <div class="seg-row">
      <div class="seg" id="labTabs">${LAB_TABS.map(([id, label]) =>
        `<button class="${labView === id ? "sel" : ""}" data-v="${id}">${label}</button>`).join("")}</div>
    </div>
    <div id="labBody"></div>
  `;
  content.querySelectorAll("#labTabs button").forEach(b =>
    b.onclick = () => { history.replaceState({}, "", "vocab.html?view=" + b.dataset.v); renderList(b.dataset.v); });
  const body = document.getElementById("labBody");
  ({ learn: renderLearnView, lessons: renderLessonsView, roots: renderRootsView, everyday: renderEverydayView, core: renderCoreView, browse: renderBrowseView })[labView](body);
}

/* ---------- Learn view ---------- */
function renderLearnView(body) {
  body.innerHTML = `
    <div class="card" style="border-color:var(--accent)" id="sheetCard">
      <div id="sheetArea">Building your sheet…</div>
    </div>`;
  renderSheet();
}

/* ---------- Roots view ---------- */
function renderRootsView(body) {
  body.innerHTML = `
    <p class="sub">One root unlocks a whole family of Quranic forms — study, drill, master. This is the fastest multiplier for your vocabulary.</p>
    <div class="fam-grid" id="famGrid"></div>`;
  const grid = document.getElementById("famGrid");
  FAMS.forEach(f => grid.appendChild(groupCard(f, "fam-", f.root, `${f.members.length} forms · from “${f.storyRef.ar}”`)));
}

/* ---------- Everyday view ---------- */
function renderEverydayView(body) {
  body.innerHTML = `
    <p class="sub">The words real conversation runs on, in connected clusters — study, drill, master.</p>
    <div class="fam-grid" id="evGrid"></div>`;
  const grid = document.getElementById("evGrid");
  EV.forEach(g => grid.appendChild(groupCard(g, "ev-", g.title, `${g.members.length} words`)));
}

/* ---------- Lessons view: everything your teacher has covered ---------- */
function renderLessonsView(body) {
  const mine = EV.filter(g => g.source === "teacher");
  if (!mine.length) {
    body.innerHTML = `<p class="sub">No lesson words here yet. When you send a page from your teacher's book, the words land here as a set you can study — and after that they come back to you automatically in Review.</p>`;
    return;
  }
  const BOOKS = { aby: "Al-ʿArabiyyah Bayna Yadayk", atq: "Arabic Through the Qur'an" };
  // group heading: a free `lesson` label wins; else compose from book/unit; else generic
  const labelOf = g => g.lesson || [BOOKS[g.book] || g.book || "", (g.unit || "").replace(/^aby(\d+)-u(\d+)$/, "Book $1, Unit $2")].filter(Boolean).join(" — ") || "Your lessons";
  const groups = {};
  mine.forEach(g => { const k = labelOf(g); (groups[k] = groups[k] || []).push(g); });
  let html = `<p class="sub">Everything your teacher has taught you, ready to study — from any book, notes, or lesson. Tap a set to learn it. Once studied, these words return automatically in <a href="review.html">Review</a> and “Start my 5 minutes” — no marking needed. Lesson grammar shows up in <a href="grammar.html">Grammar</a>, dialogues become stories, and verbs drill in <a href="sentences.html">Sentence Practice</a>.</p>`;
  const keys = Object.keys(groups);
  keys.forEach((k, ki) => {
    const total = groups[k].reduce((n, g) => n + g.members.length, 0);
    html += `<h2 style="margin:16px 0 6px;font-size:16px">${k} <span style="font-size:13px;color:var(--muted);font-weight:400">· ${total} words</span></h2><div class="fam-grid" id="less-${ki}"></div>`;
  });
  body.innerHTML = html;
  keys.forEach((k, ki) => {
    const grid = document.getElementById("less-" + ki);
    groups[k].forEach(g => grid.appendChild(groupCard(g, "ev-", g.title, `${g.members.length} words`)));
  });
}

function groupCard(obj, prefix, arTitle, metaText) {
  const div = document.createElement("div");
  div.className = "fam-card";
  div.innerHTML = `
    <div class="root">${arTitle}</div>
    <div class="theme">${obj.theme}</div>
    <div class="meta">${metaText} ${groupDone(prefix, obj.id) ? "· ✓" : ""}</div>
  `;
  const q = prefix === "fam-" ? "fam" : "ev";
  div.onclick = () => { history.pushState({}, "", `vocab.html?${q}=${obj.id}`); renderGroup(obj, "study", prefix); };
  return div;
}

/* ---------- Core view ---------- */
function renderCoreView(body) {
  body.innerHTML = `
    <p class="sub">The ≈60 highest-frequency Quran words — maximum comprehension per word. 🔊 to hear, ✓ to mark learnt.</p>
    <div class="card">
      <div class="vocab-table-wrap" style="max-height:520px;overflow-y:auto">
        <table class="vocab-table">
          <thead><tr><th>#</th><th>English</th><th class="ar-col">Arabic</th><th></th><th>Transliteration</th><th>freq.</th><th>learnt?</th></tr></thead>
          <tbody id="coreBody"></tbody>
        </table>
      </div>
      <p style="font-size:12px;color:var(--muted);margin:8px 0 0">✓ know · ↻ repeat soon · ⏳ much later · ✗ don't repeat</p>
    </div>`;
  const coreBody = document.getElementById("coreBody");
  CORE.forEach((w, i) => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td style="color:var(--muted);font-size:12px">${i + 1}</td>
      <td class="en-cell">${w.en}</td>
      <td class="ar-cell">${w.ar}</td>
      <td><span class="row-speak">🔊</span></td>
      <td class="tr-cell">${w.tr}</td>
      <td style="color:var(--muted);font-size:12px;white-space:nowrap">≈${w.n}×</td>
      <td><div class="bucket-slot"></div></td>
    `;
    tr.querySelector(".row-speak").onclick = () => speak(w.ar, 0.8);
    coreBody.appendChild(tr);
    mountBucketBar(tr.querySelector(".bucket-slot"), `qc:${i}`);
    mountMnem(tr, tr.querySelector(".row-speak").parentElement, w.ar, `qc:${i}`);
  });
}

/* ================= Vocab Learn sheet ================= */
let sheetMode = "understand";
let sheetSrc = store.get("ats-sheet-src", "mixed");
let sheetItems = null;
let pool = null;
let poolPos = 0;
let sessionDone = 0;
let poolLabel = "auto";
const BATCH = 10;

/* A matured word gets re-tested INSIDE a real ayah — isolated-row recognition
   overestimates what you'd catch in actual recitation. Studied surahs first. */
function findVerseCtx(ar) {
  const t = normalizeAr(ar);
  if (!t || !VERSES) return null;
  const ordered = [...VERSES].sort((a, b) =>
    (stepsDone("q-" + b.id).study || stepsDone("q-" + b.id).test ? 1 : 0) - (stepsDone("q-" + a.id).study || stepsDone("q-" + a.id).test ? 1 : 0));
  for (const s of ordered) for (const v of s.verses) {
    for (let wi = 0; wi < v.words.length; wi++) {
      if (normalizeAr(v.words[wi][0]) === t) {
        return { n: s.n, ayah: parseInt(v.ref.split(":")[1]), ref: v.ref, words: v.words, wi, surah: s.name };
      }
    }
  }
  return null;
}

async function buildPool() {
  const inSrc = key => sheetSrc === "mixed" || catsOf(key).includes(sheetSrc);
  const due = dueCards().filter(inSrc);
  const items = (await resolveCards(due)).map(x => ({ ...x, isNew: false }));
  const srsNow = getSrs();
  items.forEach(x => {
    const e = srsNow[x.key];
    if (x.key.startsWith("qc:") && e && e.box >= 3) x.ctx = findVerseCtx(x.v.ar);
  });
  const srs = getSrs();
  const newQc = [], newEv = [], newLesson = [], newFam = [], newStory = [];
  CORE.forEach((w, i) => {
    const key = `qc:${i}`;
    if (!srs[key]) newQc.push({ key, v: { ar: w.ar, en: w.en, tr: w.tr, note: `≈${w.n}× in the Quran` }, isNew: true });
  });
  // teacher/lesson clusters jump to the front of the new pool (current lesson first)
  EV.forEach(g => g.members.forEach((m, i) => {
    const key = `ev-${g.id}:${i}`;
    if (srs[key]) return;
    const item = { key, v: { ar: m.ar, en: m.en, tr: m.tr, note: g.source === "teacher" ? "📘 " + (g.lesson || "your lesson") : g.theme.split("—")[0].trim() }, isNew: true };
    (g.source === "teacher" ? newLesson : newEv).push(item);
  }));
  FAMS.forEach(f => f.members.forEach((m, i) => {
    const key = `fam-${f.id}:${i}`;
    if (!srs[key]) newFam.push({ key, v: { ar: m.ar, en: m.en, tr: m.tr, note: "root " + f.root }, isNew: true });
  }));
  for (const s of STORY_LIST.filter(s => !s.locked)) {
    try {
      const st = await loadStory(s.id);
      st.vocab.forEach((w, i) => {
        const key = `${s.id}:${i}`;
        if (!srs[key]) newStory.push({ key, v: { ar: w.ar, en: w.en, tr: w.tr, note: s.titleEn }, isNew: true });
      });
    } catch (e) {}
  }
  let fresh;
  if (sheetSrc === "quran") fresh = [...newQc, ...newFam];
  else if (sheetSrc === "msa") fresh = [...newLesson, ...newEv, ...newStory, ...newFam];
  else {
    const mixed = [];
    while (newQc.length || newEv.length) mixed.push(...newQc.splice(0, 5), ...newEv.splice(0, 5));
    fresh = [...newLesson, ...mixed, ...newFam, ...newStory]; // current lesson leads
  }
  return [...items, ...fresh];
}

async function renderSheet() {
  const area = document.getElementById("sheetArea");
  if (!area) return;
  if (!pool) { pool = await buildPool(); poolPos = 0; poolLabel = "auto"; }
  if (!sheetItems) { sheetItems = pool.slice(poolPos, poolPos + BATCH); poolPos += sheetItems.length; }
  if (!sheetItems.length) { area.innerHTML = `<p>🎉 Everything in this queue is done — ${sessionDone} words this session.</p>`; return; }
  const seg = (id, opts, cur) => `<div class="seg" id="${id}">${opts.map(([v, l]) =>
    `<button class="${cur === v ? "sel" : ""}" data-v="${v}">${l}</button>`).join("")}</div>`;
  area.innerHTML = `
    ${poolLabel !== "auto"
      ? `<p style="font-size:13px;color:var(--amber);font-weight:600;margin:0 0 8px">Practicing: ${poolLabel} (${pool.length}) — <a href="vocab.html?view=learn" style="color:var(--accent)">back to auto</a></p>`
      : `<div class="seg-row">
          ${seg("segSrc", [["mixed", "Mixed"], ["quran", "📖 Quran"], ["msa", "🗣 MSA"]], sheetSrc)}
          ${seg("segMode", [["understand", "Understand"], ["produce", "Write"], ["ears", "🎧 Ears"]], sheetMode)}
        </div>`}
    ${sheetMode === "ears" ? (hasArabicVoice()
      ? `<p style="font-size:12.5px;color:var(--muted);margin:8px 0 0">🎧 Sound only — play each word, write the meaning. The Arabic appears after you check. This is the skill both your goals actually need.</p>`
      : `<p style="font-size:12.5px;color:var(--red);margin:8px 0 0">This device has no Arabic voice installed, so Ears mode can't play words — on Android/iPhone it usually works in Chrome/Safari; on desktop, Edge has one built in.</p>`) : ""}
    <div class="vocab-table-wrap">
      <table class="vocab-table"><tbody id="shBody"></tbody></table>
    </div>
    <div class="ex-row" style="margin-top:12px">
      <button class="primary" id="shCheck">✓ Check</button>
      <button id="shShowAll">👁 Show all</button>
      ${sheetMode === "produce" ? '<button class="small" id="shKb">⌨</button>' : ""}
      <span style="font-size:12px;color:var(--muted);align-self:center">Checking auto-schedules each word — the ✓ know · ↻ soon · ⏳ later · ✗ never buttons are optional overrides.</span>
    </div>
    <div class="quiz-score" id="shScore"></div>
  `;
  const segSrc = document.getElementById("segSrc");
  if (segSrc) segSrc.querySelectorAll("button").forEach(b => b.onclick = () => {
    sheetSrc = b.dataset.v;
    store.set("ats-sheet-src", sheetSrc);
    pool = null; sheetItems = null;
    renderSheet();
  });
  const segMode = document.getElementById("segMode");
  if (segMode) segMode.querySelectorAll("button").forEach(b => b.onclick = () => { sheetMode = b.dataset.v; renderSheet(); });

  const tbody = document.getElementById("shBody");
  let lastFocused = null;
  tbody.addEventListener("focusin", e => { if (e.target.tagName === "INPUT") lastFocused = e.target; });
  tbody.addEventListener("keydown", e => {
    if (e.key === "Enter") { e.preventDefault(); document.getElementById("shCheck").click(); }
  });

  const revealed = new Set();
  function showRow(i, quiet) {
    if (revealed.has(i)) return;
    revealed.add(i);
    const { key, v } = sheetItems[i];
    // look up by data-row: 💡 hook rows are interleaved, so child index is unreliable
    const row = tbody.querySelector(`tr[data-row="${i}"]`);
    const shown = row.querySelector(".shown-answer");
    if (sheetMode === "understand") {
      shown.innerHTML = `<span style="font-weight:600">${v.en}</span>${v.note ? ` <span style="color:var(--muted);font-size:12px">${v.note}</span>` : ""}`;
    } else if (sheetMode === "ears") {
      shown.innerHTML = `<span class="arabic" style="font-size:22px" dir="rtl">${v.ar}</span> <span style="font-weight:600">${v.en}</span>${v.tr ? ` <span style="color:var(--muted);font-size:12px">${v.tr}</span>` : ""}`;
    } else {
      shown.innerHTML = `<span class="arabic" style="font-size:22px" dir="rtl">${v.ar}</span> <span class="row-speak" style="cursor:pointer">🔊</span>`;
      shown.querySelector(".row-speak").onclick = () => speak(v.ar, 0.8);
    }
    shown.style.display = "block";
    const btn = row.querySelector(".show-btn");
    if (btn) btn.style.display = "none";
    if (!quiet) logEvent({ e: "reveal", key, mode: sheetMode });
  }

  sheetItems.forEach((item, i) => {
    const { key, v, isNew, ctx } = item;
    const tr = document.createElement("tr");
    tr.dataset.row = i;
    if (sheetMode === "understand") {
      const arCell = ctx
        ? `<td class="ar-cell" style="font-size:21px;line-height:1.9">${ctx.words.map((w, wi) =>
            wi === ctx.wi ? `<strong style="color:var(--accent)">${w[0]}</strong>` : w[0]).join(" ")}
           <div style="font-size:11px;color:var(--amber);font-family:var(--font-ui)">in context — the highlighted word (${ctx.ref})</div></td>`
        : `<td class="ar-cell">${v.ar}</td>`;
      tr.innerHTML = `
        ${arCell}
        <td><span class="row-speak">🔊</span></td>
        <td class="tr-cell">${v.tr || ""}</td>
        <td style="min-width:150px">
          <div style="display:flex;gap:6px;align-items:center"><input class="phonetic-box" style="margin-top:0" data-i="${i}" placeholder="meaning…" autocomplete="off"><button class="small show-btn" data-i="${i}">show</button></div>
          <span class="shown-answer" style="display:none;font-size:14px"></span>
          <span class="correct-answer" style="font-family:var(--font-ui);font-size:14px;direction:ltr;color:var(--ink);display:none"></span><div class="bucket-slot"></div></td>
      `;
    } else if (sheetMode === "ears") {
      tr.innerHTML = `
        <td style="white-space:nowrap"><button class="small ears-play" data-i="${i}">🔊 play</button></td>
        <td style="min-width:150px">
          <div style="display:flex;gap:6px;align-items:center"><input class="phonetic-box" style="margin-top:0" data-i="${i}" placeholder="what did it mean?" autocomplete="off"><button class="small show-btn" data-i="${i}">show</button></div>
          <span class="shown-answer" style="display:none;font-size:14px"></span>
          <span class="correct-answer" style="font-family:var(--font-ui);font-size:14px;direction:ltr;color:var(--ink);display:none"></span><div class="bucket-slot"></div></td>
      `;
    } else {
      tr.innerHTML = `
        <td class="en-cell">${v.en}${isNew ? ' <span style="color:var(--amber);font-size:11px">new</span>' : ""}</td>
        <td style="text-align:right">
          <div style="display:flex;gap:6px;align-items:center;justify-content:flex-end"><button class="small show-btn" data-i="${i}">show</button><input class="fill-input" data-i="${i}" autocomplete="off"></div>
          <span class="shown-answer" style="display:none"></span>
          <span class="correct-answer" style="display:none"></span><div class="bucket-slot"></div></td>
        <td class="tr-cell">${v.tr || ""}</td>
      `;
    }
    const spk = tr.querySelector(".row-speak");
    if (spk) spk.onclick = () => ctx ? playRecitation([{ n: ctx.n, ayah: ctx.ayah }]) : speak(v.ar, 0.8);
    const ears = tr.querySelector(".ears-play");
    if (ears) ears.onclick = () => speak(v.ar, 0.8);
    tr.querySelector(".show-btn").onclick = () => showRow(i);
    tbody.appendChild(tr);
    mountBucketBar(tr.querySelector(".bucket-slot"), key);
    // 💡 visible from the start — an opt-in hint, not tied to reveal
    const spkTd = tr.querySelector(".row-speak, .ears-play");
    mountMnem(tr, spkTd ? spkTd.parentElement : tr.querySelector(".en-cell"), v.ar, key);
  });

  document.getElementById("shShowAll").onclick = () => {
    sheetItems.forEach((x, i) => showRow(i, true));
    logEvent({ e: "reveal-all", mode: sheetMode, n: sheetItems.length });
  };

  if (sheetMode === "produce") {
    const kb = document.getElementById("shKb");
    lastFocused = lastFocused || tbody.querySelector(".fill-input");
    if (kb) kb.onclick = () => mountTranslitDock(() => lastFocused);
    mountTranslitDock(() => lastFocused, true);
  }

  function showBatchScore(right, graded) {
    if (graded === undefined) graded = sheetItems.length;
    sessionDone += sheetItems.length;
    document.getElementById("shScore").innerHTML =
      (graded === 0
        ? "Self-studied — bucket each word above."
        : `Score: ${right} / ${graded}` + (right === graded ? " — ممتاز! 🎉" : " — the red ones come back automatically.")) +
      `<div class="ex-row" style="margin-top:10px">
        <button class="primary" id="shMore">＋ Keep going (next ${Math.min(BATCH, pool.length - poolPos)})</button>
        <span style="font-size:13px;color:var(--muted);align-self:center">${sessionDone} words this session</span>
      </div>`;
    logEvent({ e: "sheet-done", mode: sheetMode, score: right, total: graded });
    autoSync();
    const more = document.getElementById("shMore");
    if (TODAY) {
      const last = TODAY.stage >= TODAY_STAGES.length - 1;
      more.style.display = "";
      more.textContent = last ? "✓ Finish today's round" : "Next step →";
      more.onclick = () => last ? finishToday() : startToday(TODAY.stage + 1);
    } else if (pool.length - poolPos <= 0) more.style.display = "none";
    else more.onclick = () => { sheetItems = null; renderSheet(); window.scrollTo({ top: 0 }); };
  }

  let batchChecked = false;
  document.getElementById("shCheck").onclick = () => {
    if (batchChecked) return;
    batchChecked = true;
    let right = 0, graded = 0;
    sheetItems.forEach(({ key, v }, i) => {
      if (revealed.has(i)) return;
      graded++;
      const input = tbody.querySelector(`input[data-i="${i}"]`);
      const ans = tbody.querySelectorAll(".correct-answer")[i];
      const ok = sheetMode === "produce" ? arMatch(input.value, v.ar) : fuzzyEn(input.value, v.en);
      input.classList.remove("ok", "no");
      input.classList.add(ok ? "ok" : "no");
      if (ok && sheetMode !== "ears") { right++; ans.style.display = "none"; }
      else if (sheetMode === "ears") {
        // ears: always reveal the Arabic after the check — he heard it, now he sees it
        if (ok) right++;
        ans.style.display = "block";
        ans.innerHTML = `<span class="arabic" style="font-size:20px" dir="rtl">${v.ar}</span>${ok ? "" : ` — ${v.en}`}`;
      }
      else { ans.style.display = "block"; ans.textContent = sheetMode === "understand" ? v.en : v.ar; }
      gradeCard(key, ok ? "good" : "again");
      logEvent({ e: "sheet", key, mode: sheetMode, typed: input.value, ok });
      mountBucketBar(tbody.querySelectorAll(".bucket-slot")[i], key);
    });
    showBatchScore(right, graded);
  };
}

function mountBucketBar(slot, key) {
  if (!slot) return;
  const bar = document.createElement("div");
  bar.className = "bucket-bar";
  const current = bucketOf(key);
  BUCKETS.forEach(b => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.textContent = b.label;
    btn.title = b.name;
    if (b.id === current && getSrs()[key] && getSrs()[key].b) btn.classList.add("sel", b.id === "never" ? "never" : "x");
    btn.onclick = () => {
      setBucket(key, b.id);
      logEvent({ e: "bucket", key, b: b.id });
      [...bar.children].forEach(c => c.classList.remove("sel", "never"));
      btn.classList.add("sel");
      if (b.id === "never") btn.classList.add("never");
    };
    bar.appendChild(btn);
  });
  slot.innerHTML = "";
  slot.appendChild(bar);
}

/* ================= Browse view ================= */
let catalog = null;
let browseFilter = "unmarked";
let browseCat = "all";

async function buildCatalog() {
  const items = [];
  CORE.forEach((w, i) => items.push({ key: `qc:${i}`, v: { ar: w.ar, en: w.en, tr: w.tr, note: `≈${w.n}× Quran` } }));
  EV.forEach(g => g.members.forEach((m, i) => items.push({ key: `ev-${g.id}:${i}`, v: { ar: m.ar, en: m.en, tr: m.tr, note: g.theme.split("—")[0].trim() } })));
  FAMS.forEach(f => f.members.forEach((m, i) => items.push({ key: `fam-${f.id}:${i}`, v: { ar: m.ar, en: m.en, tr: m.tr, note: "root " + f.root } })));
  for (const s of STORY_LIST.filter(s => !s.locked)) {
    try {
      const st = await loadStory(s.id);
      st.vocab.forEach((w, i) => items.push({ key: `${s.id}:${i}`, v: { ar: w.ar, en: w.en, tr: w.tr, note: s.titleEn } }));
    } catch (e) {}
  }
  const have = new Set(items.map(x => x.key));
  const extra = Object.keys(getSrs()).filter(k => !have.has(k));
  (await resolveCards(extra)).forEach(x => items.push(x));
  return items;
}

const FILTERS = [
  ["unmarked", "Unmarked"],
  ["due", "Due now"],
  ["repeat", "Repeat"],
  ["later", "Later"],
  ["know", "Know"],
  ["never", "Don't repeat"],
];

function catCatalog() {
  return catalog.filter(({ key }) => browseCat === "all" || catsOf(key).includes(browseCat));
}
function filterCatalog() {
  const now = Date.now();
  const srs = getSrs();
  return catCatalog().filter(({ key }) => {
    if (browseFilter === "due") { const e = srs[key]; return e && e.due <= now && bucketOf(key) !== "never"; }
    return bucketOf(key) === browseFilter;
  });
}

async function renderBrowseView(body) {
  body.innerHTML = `
    <div class="card">
      <p class="sub" style="margin-bottom:10px">Every word, filterable by category and bucket. Practice exactly what you select — including unmarked and don't-repeat.</p>
      <div class="chips" id="catChips"></div>
      <div class="chips" id="bucketChips"></div>
      <div class="ex-row" style="margin-bottom:10px">
        <button class="primary" id="practiceBucket">📝 Practice this selection</button>
        <span id="bucketCount" style="font-size:13px;color:var(--muted);align-self:center"></span>
      </div>
      <div class="vocab-table-wrap" style="max-height:420px;overflow-y:auto">
        <table class="vocab-table"><tbody id="browseBody"></tbody></table>
      </div>
      <p style="font-size:12px;color:var(--muted);margin:8px 0 0">✓ know · ↻ repeat soon · ⏳ much later · ✗ don't repeat</p>
    </div>`;
  if (!catalog) catalog = await buildCatalog();
  const chips = document.getElementById("bucketChips");
  const catChips = document.getElementById("catChips");

  function refresh() {
    catChips.innerHTML = "";
    [["all", "All"], ["quran", "📖 Quran"], ["msa", "🗣 MSA"]].forEach(([id, label]) => {
      const b = document.createElement("button");
      const n = catalog.filter(({ key }) => id === "all" || catsOf(key).includes(id)).length;
      b.textContent = `${label} (${n})`;
      if (id === browseCat) b.classList.add("sel");
      b.onclick = () => { browseCat = id; refresh(); };
      catChips.appendChild(b);
    });
    chips.innerHTML = "";
    const base = catCatalog();
    FILTERS.forEach(([id, label]) => {
      const n = id === "due"
        ? base.filter(({ key }) => { const e = getSrs()[key]; return e && e.due <= Date.now() && bucketOf(key) !== "never"; }).length
        : base.filter(({ key }) => bucketOf(key) === id).length;
      const b = document.createElement("button");
      b.textContent = `${label} (${n})`;
      if (id === browseFilter) b.classList.add("sel");
      b.onclick = () => { browseFilter = id; refresh(); };
      chips.appendChild(b);
    });
    const rows = filterCatalog();
    document.getElementById("bucketCount").textContent = rows.length ? `${rows.length} words` : "nothing here";
    const tbody = document.getElementById("browseBody");
    tbody.innerHTML = "";
    rows.slice(0, 200).forEach(({ key, v }) => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td class="ar-cell">${v.ar}</td>
        <td><span class="row-speak">🔊</span></td>
        <td class="tr-cell">${v.tr || ""}</td>
        <td class="en-cell">${v.en}<span class="note-inline">${v.note || ""}</span></td>
        <td><div class="bucket-slot"></div></td>
      `;
      tr.querySelector(".row-speak").onclick = () => speak(v.ar, 0.8);
      const slot = tr.querySelector(".bucket-slot");
      const bar = document.createElement("div");
      bar.className = "bucket-bar";
      BUCKETS.forEach(b => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = b.label;
        btn.title = b.name;
        const cur = bucketOf(key);
        if (b.id === cur && cur !== "unmarked") btn.classList.add("sel", b.id === "never" ? "never" : "x");
        btn.onclick = () => {
          setBucket(key, b.id);
          logEvent({ e: "bucket", key, b: b.id, src: "browse" });
          refresh();
        };
        bar.appendChild(btn);
      });
      slot.appendChild(bar);
      tbody.appendChild(tr);
      mountMnem(tr, tr.querySelector(".row-speak").parentElement, v.ar, key);
    });
    if (rows.length > 200) {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td colspan="5" style="color:var(--muted);font-size:13px">…and ${rows.length - 200} more — practice the selection to work through them.</td>`;
      tbody.appendChild(tr);
    }
  }
  refresh();

  document.getElementById("practiceBucket").onclick = () => {
    const rows = filterCatalog();
    if (!rows.length) return;
    pool = rows.map(x => ({ ...x, isNew: false }));
    poolPos = 0;
    sheetItems = null;
    poolLabel = FILTERS.find(([id]) => id === browseFilter)[1] + (browseCat !== "all" ? ` · ${browseCat}` : "");
    renderList("learn");
    window.scrollTo({ top: 0 });
  };
}

/* ---------- Drill: rapid-fire mastery of a family/cluster ---------- */
function renderGroupDrill(obj, prefix) {
  const body = document.getElementById("famBody");
  const order = obj.members.map((m, i) => i).sort(() => 0.5 - Math.random());
  let pos = 0, right = 0;
  const misses = [];
  const t0 = Date.now();

  body.innerHTML = `
    <div class="card">
      <h2>Drill — rapid fire until it's automatic</h2>
      <p class="sub" style="margin-bottom:8px">English flashes up — type the Arabic and hit Enter. No hints. Misses repeat at the end.</p>
      <div class="drill-stage" id="stage"></div>
      <div class="ex-row" style="justify-content:center">
        <button class="small" id="kbToggle">⌨ keyboard</button>
      </div>
    </div>
  `;
  const stage = document.getElementById("stage");
  let currentInput = null;
  document.getElementById("kbToggle").onclick = () => mountKbDock(() => currentInput);

  function ask() {
    if (pos >= order.length) return finish();
    const i = order[pos];
    const m = obj.members[i];
    stage.innerHTML = `
      <div style="font-size:12px;color:var(--muted)">${pos + 1} / ${order.length}</div>
      <div class="d-en">${m.en}</div>
      <input class="fill-input" id="dIn" autocomplete="off" style="width:240px">
      <div class="ex-row" style="justify-content:center;margin-top:10px"><button class="primary" id="dGo">✓</button></div>
      <div class="drill-fb" id="dFb"></div>
    `;
    const input = document.getElementById("dIn");
    currentInput = input;
    input.focus();
    const submit = () => {
      const key = `${prefix}${obj.id}:${i}`;
      const ok = arMatch(input.value, m.ar);
      gradeCard(key, ok ? "good" : "again");
      logEvent({ e: "drill", fam: prefix + obj.id, i, typed: input.value, ok });
      if (ok) right++;
      else misses.push(i);
      document.getElementById("dFb").innerHTML = ok
        ? `<span style="color:var(--accent);font-weight:700;font-size:18px">✓</span>`
        : `<span class="arabic" style="font-size:26px" dir="rtl">${m.ar}</span> <span class="row-speak" style="cursor:pointer">🔊</span> <span style="color:var(--muted);font-size:13px">${m.tr}</span>`;
      const spk = document.getElementById("dFb").querySelector(".row-speak");
      if (spk) spk.onclick = () => speak(m.ar, 0.8);
      if (ok) speak(m.ar, 0.9);
      pos++;
      setTimeout(ask, ok ? 700 : 2200);
    };
    input.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); submit(); } });
    document.getElementById("dGo").onclick = submit;
  }

  function finish() {
    const secs = Math.round((Date.now() - t0) / 1000);
    setStepDone(prefix + obj.id, "drill");
    logEvent({ e: "drill-done", fam: prefix + obj.id, score: right, total: order.length, secs, misses: misses.length });
    autoSync();
    stage.innerHTML = `
      <div style="font-size:22px;font-weight:700">${right} / ${order.length} in ${secs}s ${right === order.length ? "— ممتاز! 🎉" : ""}</div>
      ${misses.length ? `<p style="font-size:14px;color:var(--muted)">Missed: ${misses.map(i => `<span class="arabic" style="font-size:19px">${obj.members[i].ar}</span>`).join("، ")}</p>` : ""}
      <div class="ex-row" style="justify-content:center;margin-top:10px">
        ${misses.length ? `<button class="primary" id="dMisses">Drill the misses (${misses.length})</button>` : ""}
        <button id="dAgain">Drill all again</button>
      </div>
    `;
    const dm = document.getElementById("dMisses");
    if (dm) dm.onclick = () => {
      order.length = 0; order.push(...misses.sort(() => 0.5 - Math.random()));
      misses.length = 0; pos = 0; right = 0;
      ask();
    };
    document.getElementById("dAgain").onclick = () => renderGroup(obj, "drill", prefix);
  }

  ask();
}

/* ================= shared phonetic keyboard dock ================= */
let _kbMounted = false;
function mountKbDock(getTarget) {
  const dock = document.getElementById("kbDock");
  if (_kbMounted) { dock.firstChild.style.display = dock.firstChild.style.display === "none" ? "block" : "none"; return; }
  _kbMounted = true;
  const kbWrap = document.createElement("div");
  kbWrap.className = "card";
  kbWrap.style.padding = "10px";
  KB_LAYOUT.forEach(r => {
    const rowDiv = document.createElement("div");
    rowDiv.className = "kb-row";
    r.forEach(k => {
      const b = document.createElement("button");
      b.type = "button";
      b.innerHTML = `<span class="k-ar">${LATIN_TO_AR[k]}</span><span class="k-lat">${k}</span>`;
      b.onmousedown = (e) => e.preventDefault();
      b.onclick = () => { const t = getTarget(); if (t) { t.value += LATIN_TO_AR[k]; t.focus(); } };
      rowDiv.appendChild(b);
    });
    kbWrap.appendChild(rowDiv);
  });
  const extra = document.createElement("div");
  extra.className = "kb-row";
  const sp = document.createElement("button"); sp.innerHTML = `<span class="k-lat">space</span>`; sp.style.minWidth = "140px";
  sp.onmousedown = e => e.preventDefault(); sp.onclick = () => { const t = getTarget(); if (t) { t.value += " "; t.focus(); } };
  const del = document.createElement("button"); del.innerHTML = `<span class="k-lat">⌫</span>`;
  del.onmousedown = e => e.preventDefault(); del.onclick = () => { const t = getTarget(); if (t) { t.value = t.value.slice(0, -1); t.focus(); } };
  extra.appendChild(sp); extra.appendChild(del);
  kbWrap.appendChild(extra);
  dock.appendChild(kbWrap);
}
</script>
</body>
</html>
