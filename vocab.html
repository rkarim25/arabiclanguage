<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d7a5f">
  <title>Vocab Lab — Arabic Through Stories</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .fam-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
    .fam-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 16px; cursor: pointer; transition: transform .12s;
    }
    .fam-card:hover { transform: translateY(-2px); border-color: var(--accent); }
    .fam-card .root { font-family: var(--font-ar); font-size: 30px; color: var(--accent); direction: rtl; }
    .fam-card .theme { font-size: 12.5px; color: var(--muted); margin-top: 4px; }
    .fam-card .meta { font-size: 12px; color: var(--muted); margin-top: 8px; }
    .verse-card {
      background: #f6f2ea; border: 1px solid var(--border); border-radius: 12px;
      padding: 14px 16px; margin-top: 10px;
    }
    .verse-card .v-ar { direction: rtl; text-align: right; font-family: var(--font-ar); font-size: 26px; line-height: 2; }
    .verse-card .v-en { font-size: 13.5px; color: var(--muted); margin-top: 4px; }
    .verse-card .v-ref { font-size: 12px; color: var(--amber); font-weight: 600; }
    .fill-input {
      direction: rtl; text-align: right; font-family: var(--font-ar); font-size: 22px;
      border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; width: 180px;
      background: #fffdf9;
    }
    .fill-input:focus { outline: 2px solid var(--accent-soft); border-color: var(--accent); }
    .fill-input.ok { border-color: var(--accent); background: var(--accent-soft); }
    .fill-input.no { border-color: var(--red); background: var(--red-soft); }
    .correct-answer { font-family: var(--font-ar); font-size: 20px; color: var(--accent); direction: rtl; display: block; }
    #kbDock { position: sticky; bottom: 0; background: var(--bg); padding: 8px 0; }
  </style>
</head>
<body>
<main>
  <div id="content">Loading…</div>
  <div id="kbDock"></div>
</main>

<script src="js/app.js"></script>
<script src="js/tracker.js"></script>
<script>
renderNav("vocab");
trackPage("vocab");

const content = document.getElementById("content");
let FAMS = null, CORE = null;

Promise.all([
  fetch("data/families.json").then(r => r.json()),
  fetch("data/quran-core.json").then(r => r.json()),
]).then(([f, c]) => {
  FAMS = f.families;
  CORE = c.words;
  const params = new URLSearchParams(location.search);
  const famId = params.get("fam");
  const fam = FAMS.find(x => x.id === famId);
  if (fam) renderFamily(fam, params.get("mode") || "study");
  else renderList();
});

function famDone(id) { return !!stepsDone("fam-" + id).fill; }

function renderList() {
  trackPage("vocab:list");
  content.innerHTML = `
    <h1>Vocab Lab <span class="arabic" style="color:var(--accent)">مُخْتَبَر المُفْرَدَات</span></h1>
    <p class="sub">Everything here is ordered by <strong>frequency</strong> — the words you'll meet most often, first. No wasted memorization.</p>
    <div class="card" style="border-color:var(--accent)" id="sheetCard">
      <h2>📝 Vocab Learn — as short or long as you like</h2>
      <p class="sub" style="margin-bottom:10px">Picked automatically: words due for review first, then the next most-frequent words you haven't met. Fill the column, check, and either stop there or keep going — misses come back by themselves.</p>
      <div id="sheetArea">Building your sheet…</div>
    </div>
    <h2 style="margin-top:24px">📖 The Quran core — most frequent words first</h2>
    <p class="sub">These ≈60 words are the highest-yield vocabulary in existence for understanding recitation. They flow into Today's Sheet a few at a time.</p>
    <div class="card">
      <div class="vocab-table-wrap">
        <table class="vocab-table">
          <thead><tr><th>#</th><th>English</th><th class="ar-col">Arabic</th><th></th><th>Transliteration</th><th>freq.</th></tr></thead>
          <tbody id="coreBody"></tbody>
        </table>
      </div>
    </div>
    <h2 style="margin-top:24px">🌿 Root families</h2>
    <p class="sub">One story word opens a whole root — study the family, then fill in the sheet from memory.</p>
    <div class="fam-grid" id="famGrid"></div>
  `;
  /* core table */
  const srs = getSrs();
  const coreBody = document.getElementById("coreBody");
  CORE.forEach((w, i) => {
    const tr = document.createElement("tr");
    const st = srs[`qc:${i}`];
    tr.innerHTML = `
      <td style="color:var(--muted);font-size:12px">${i + 1}</td>
      <td class="en-cell">${w.en}${st ? ` <span style="color:var(--accent);font-size:11px">✓ box ${st.box}</span>` : ""}</td>
      <td class="ar-cell">${w.ar}</td>
      <td><span class="row-speak">🔊</span></td>
      <td class="tr-cell">${w.tr}</td>
      <td style="color:var(--muted);font-size:12px;white-space:nowrap">≈${w.n}×</td>
    `;
    tr.querySelector(".row-speak").onclick = () => speak(w.ar, 0.8);
    coreBody.appendChild(tr);
  });
  /* families */
  const grid = document.getElementById("famGrid");
  FAMS.forEach(f => {
    const div = document.createElement("div");
    div.className = "fam-card";
    div.innerHTML = `
      <div class="root">${f.root}</div>
      <div class="theme">${f.theme}</div>
      <div class="meta">${f.members.length} forms · from “${f.storyRef.ar}” ${famDone(f.id) ? "· ✓ sheet done" : ""}</div>
    `;
    div.onclick = () => { history.pushState({}, "", `vocab.html?fam=${f.id}`); renderFamily(f, "study"); };
    grid.appendChild(div);
  });
  renderSheet();
}

/* ---------- Vocab Learn: endless auto-picked batches ---------- */
let sheetMode = "understand"; // understand: Ar→En (Quran comprehension) | produce: En→Ar (speaking)
let sheetItems = null;   // current batch
let pool = null;         // full ordered queue: due → new core → new family forms
let poolPos = 0;
let sessionDone = 0;
const BATCH = 10;

async function buildPool() {
  const due = dueCards();
  const items = (await resolveCards(due)).map(x => ({ ...x, isNew: false }));
  const srs = getSrs();
  // next new words, most frequent first
  CORE.forEach((w, i) => {
    const key = `qc:${i}`;
    if (!srs[key]) items.push({ key, v: { ar: w.ar, en: w.en, tr: w.tr, note: `≈${w.n}× in the Quran` }, isNew: true, fam: w.fam });
  });
  // then unlearned root-family forms (linked words in one go)
  FAMS.forEach(f => {
    f.members.forEach((m, i) => {
      const key = `fam-${f.id}:${i}`;
      if (!srs[key]) items.push({ key, v: { ar: m.ar, en: m.en, tr: m.tr, note: "root " + f.root }, isNew: true });
    });
  });
  return items;
}

async function renderSheet() {
  const area = document.getElementById("sheetArea");
  if (!pool) { pool = await buildPool(); poolPos = 0; }
  if (!sheetItems) { sheetItems = pool.slice(poolPos, poolPos + BATCH); poolPos += sheetItems.length; }
  if (!sheetItems.length) { area.innerHTML = `<p>🎉 You've worked through everything available — ${sessionDone} words this session. New content lands with your next coaching update.</p>`; return; }
  area.innerHTML = `
    <div class="toggles" style="margin-bottom:10px">
      <label><input type="radio" name="shMode" value="understand" ${sheetMode === "understand" ? "checked" : ""}> Understand (عربي → English)</label>
      <label><input type="radio" name="shMode" value="produce" ${sheetMode === "produce" ? "checked" : ""}> Produce (English → عربي)</label>
    </div>
    <div class="vocab-table-wrap">
      <table class="vocab-table"><tbody id="shBody"></tbody></table>
    </div>
    <div class="ex-row" style="margin-top:12px">
      <button class="primary" id="shCheck">✓ Check the sheet</button>
      ${sheetMode === "produce" ? '<button class="small" id="shKb">⌨ Phonetic keyboard</button>' : ""}
    </div>
    <div class="quiz-score" id="shScore"></div>
  `;
  area.querySelectorAll("input[name=shMode]").forEach(r => r.onchange = () => { sheetMode = r.value; renderSheet(); });
  const tbody = document.getElementById("shBody");
  let lastFocused = null;
  tbody.addEventListener("focusin", e => { if (e.target.tagName === "INPUT") lastFocused = e.target; });
  tbody.addEventListener("keydown", e => {
    if (e.key === "Enter") { e.preventDefault(); document.getElementById("shCheck").click(); }
  });

  sheetItems.forEach(({ key, v, isNew }, i) => {
    const tr = document.createElement("tr");
    if (sheetMode === "understand") {
      tr.innerHTML = `
        <td class="ar-cell">${v.ar}</td>
        <td><span class="row-speak">🔊</span></td>
        <td class="tr-cell">${v.tr || ""}</td>
        <td style="min-width:150px"><input class="phonetic-box" style="margin-top:0" data-i="${i}" placeholder="meaning..." autocomplete="off"><span class="correct-answer" style="font-family:var(--font-ui);font-size:14px;direction:ltr;color:var(--ink);display:none"></span></td>
      `;
    } else {
      tr.innerHTML = `
        <td class="en-cell">${v.en}${isNew ? ' <span style="color:var(--amber);font-size:11px">new</span>' : ""}</td>
        <td style="text-align:right"><input class="fill-input" data-i="${i}" autocomplete="off"><span class="correct-answer" style="display:none"></span></td>
        <td class="tr-cell">${v.tr || ""}</td>
      `;
    }
    const spk = tr.querySelector(".row-speak");
    if (spk) spk.onclick = () => speak(v.ar, 0.8);
    tbody.appendChild(tr);
  });

  if (sheetMode === "produce") {
    document.getElementById("shKb").onclick = () => mountKbDock(() => lastFocused);
  }

  let batchChecked = false;
  document.getElementById("shCheck").onclick = () => {
    if (batchChecked) return; // don't double-grade on repeat Enter/click
    batchChecked = true;
    let right = 0;
    sheetItems.forEach(({ key, v }, i) => {
      const input = tbody.querySelector(`input[data-i="${i}"]`);
      const ans = tbody.querySelectorAll(".correct-answer")[i];
      const ok = sheetMode === "understand"
        ? fuzzyEn(input.value, v.en)
        : normalizeAr(input.value) === normalizeAr(v.ar);
      input.classList.remove("ok", "no");
      input.classList.add(ok ? "ok" : "no");
      if (ok) { right++; ans.style.display = "none"; }
      else { ans.style.display = "block"; ans.textContent = sheetMode === "understand" ? v.en : v.ar; }
      gradeCard(key, ok ? "good" : "again");
      logEvent({ e: "sheet", key, mode: sheetMode, typed: input.value, ok });
    });
    sessionDone += sheetItems.length;
    document.getElementById("shScore").innerHTML =
      `Score: ${right} / ${sheetItems.length}` +
      (right === sheetItems.length ? " — ممتاز! 🎉" : " — the red ones come back automatically.") +
      `<div class="ex-row" style="margin-top:10px">
        <button class="primary" id="shMore">＋ Keep going (next ${Math.min(BATCH, pool.length - poolPos)})</button>
        <span style="font-size:13px;color:var(--muted);align-self:center">${sessionDone} words this session — stopping here is fine too</span>
      </div>`;
    logEvent({ e: "sheet-done", mode: sheetMode, score: right, total: sheetItems.length });
    autoSync();
    const more = document.getElementById("shMore");
    if (pool.length - poolPos <= 0) more.style.display = "none";
    else more.onclick = () => { sheetItems = null; renderSheet(); window.scrollTo({ top: document.getElementById("sheetCard").offsetTop - 60 }); };
  };
}

/* shared phonetic keyboard dock */
let _kbMounted = false;
function mountKbDock(getTarget) {
  const dock = document.getElementById("kbDock");
  if (_kbMounted) { dock.firstChild.style.display = dock.firstChild.style.display === "none" ? "block" : "none"; return; }
  _kbMounted = true;
  const kbWrap = document.createElement("div");
  kbWrap.className = "card";
  kbWrap.style.padding = "10px";
  KB_LAYOUT.forEach(r => {
    const rowDiv = document.createElement("div");
    rowDiv.className = "kb-row";
    r.forEach(k => {
      const b = document.createElement("button");
      b.type = "button";
      b.innerHTML = `<span class="k-ar">${LATIN_TO_AR[k]}</span><span class="k-lat">${k}</span>`;
      b.onmousedown = (e) => e.preventDefault();
      b.onclick = () => { const t = getTarget(); if (t) { t.value += LATIN_TO_AR[k]; t.focus(); } };
      rowDiv.appendChild(b);
    });
    kbWrap.appendChild(rowDiv);
  });
  const extra = document.createElement("div");
  extra.className = "kb-row";
  const sp = document.createElement("button"); sp.innerHTML = `<span class="k-lat">space</span>`; sp.style.minWidth = "140px";
  sp.onmousedown = e => e.preventDefault(); sp.onclick = () => { const t = getTarget(); if (t) { t.value += " "; t.focus(); } };
  const del = document.createElement("button"); del.innerHTML = `<span class="k-lat">⌫</span>`;
  del.onmousedown = e => e.preventDefault(); del.onclick = () => { const t = getTarget(); if (t) { t.value = t.value.slice(0, -1); t.focus(); } };
  extra.appendChild(sp); extra.appendChild(del);
  kbWrap.appendChild(extra);
  dock.appendChild(kbWrap);
}

function renderFamily(fam, mode) {
  trackPage(`vocab:${fam.id}:${mode}`);
  window.scrollTo({ top: 0 });
  content.innerHTML = `
    <p><a href="vocab.html" style="color:var(--accent);text-decoration:none">← All families</a></p>
    <h1 style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <span>Root family</span>
      <span class="arabic" style="color:var(--accent)" dir="rtl">${fam.root}</span>
    </h1>
    <p class="sub">${fam.theme}. You met <strong class="arabic" style="font-size:19px">${fam.storyRef.ar}</strong> in
      <a href="story.html?id=${fam.storyRef.story}">the story</a> — now own the whole family.</p>
    <div class="steps" style="max-width:400px">
      <button id="mStudy" class="${mode === "study" ? "active" : ""}"><span class="ar">اُدْرُسْ</span><span>Study</span></button>
      <button id="mFill" class="${mode === "fill" ? "active" : ""}"><span class="ar">اِمْلَأْ</span><span>Fill the sheet${famDone(fam.id) ? " ✓" : ""}</span></button>
    </div>
    <div id="famBody"></div>
  `;
  document.getElementById("mStudy").onclick = () => renderFamily(fam, "study");
  document.getElementById("mFill").onclick = () => renderFamily(fam, "fill");
  (mode === "fill" ? renderFill : renderStudy)(fam);
}

/* ---------- Study ---------- */
function renderStudy(fam) {
  const body = document.getElementById("famBody");
  body.innerHTML = `
    <div class="card">
      <h2>The family — say each one aloud</h2>
      <div class="vocab-table-wrap">
        <table class="vocab-table">
          <thead><tr><th>English</th><th class="ar-col">Arabic</th><th></th><th>Transliteration</th></tr></thead>
          <tbody id="vtBody"></tbody>
        </table>
      </div>
    </div>
    <div class="card">
      <h2>In the Quran <span class="arabic" style="color:var(--accent)">في القُرْآن</span></h2>
      <p class="sub" style="margin-bottom:6px">Real verses using this root. (🔊 is synthetic — for tajwīd, listen to a reciter.)</p>
      <div id="verses"></div>
    </div>
    <div class="ex-row">
      <button class="primary" id="toFill">I've studied it — fill the sheet →</button>
    </div>
  `;
  const tbody = document.getElementById("vtBody");
  fam.members.forEach(m => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="en-cell">${m.en}</td>
      <td class="ar-cell">${m.ar}</td>
      <td><span class="row-speak" title="hear it">🔊</span></td>
      <td class="tr-cell">${m.tr}</td>
    `;
    tr.querySelector(".row-speak").onclick = () => speak(m.ar, 0.8);
    tbody.appendChild(tr);
  });
  const verses = document.getElementById("verses");
  fam.quran.forEach(v => {
    const div = document.createElement("div");
    div.className = "verse-card";
    div.innerHTML = `
      <div class="v-ar">${v.ar} <span class="sent-play">🔊</span></div>
      <div class="v-en">${v.en}</div>
      <div class="v-ref">Quran ${v.ref}</div>
    `;
    div.querySelector(".sent-play").onclick = () => speak(v.ar, 0.75);
    verses.appendChild(div);
  });
  document.getElementById("toFill").onclick = () => renderFamily(fam, "fill");
}

/* ---------- Fill the sheet ---------- */
function renderFill(fam) {
  const body = document.getElementById("famBody");
  body.innerHTML = `
    <div class="card">
      <h2>Fill in the Arabic, then check</h2>
      <div class="toggles">
        <label><input type="checkbox" id="tgTr" checked> Transliteration hints</label>
      </div>
      <div class="vocab-table-wrap">
        <table class="vocab-table">
          <thead><tr><th>English</th><th class="ar-col">Arabic — type it</th><th>Transliteration</th></tr></thead>
          <tbody id="fillBody"></tbody>
        </table>
      </div>
      <div class="ex-row" style="margin-top:14px">
        <button class="primary" id="checkAll">✓ Check my answers</button>
        <button class="small" id="kbToggle">⌨ Phonetic keyboard</button>
      </div>
      <div class="quiz-score" id="fillScore"></div>
      <p style="font-size:13px;color:var(--muted)">Vowel marks optional — spelling is what's checked. Type Arabic directly, use the phonetic keyboard, or your <a href="keyboard.html" target="_blank">keyboard tool</a>.</p>
    </div>
  `;
  const tbody = document.getElementById("fillBody");
  let lastFocused = null;

  fam.members.forEach((m, i) => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="en-cell">${m.en}</td>
      <td style="text-align:right"><input class="fill-input" data-i="${i}" autocomplete="off"><span class="correct-answer" style="display:none"></span></td>
      <td class="tr-cell">${m.tr}</td>
    `;
    tbody.appendChild(tr);
  });
  tbody.addEventListener("focusin", e => { if (e.target.classList.contains("fill-input")) lastFocused = e.target; });

  document.getElementById("tgTr").onchange = (e) => {
    [...tbody.querySelectorAll(".tr-cell")].forEach(c => c.style.visibility = e.target.checked ? "visible" : "hidden");
  };

  document.getElementById("kbToggle").onclick = () => mountKbDock(() => lastFocused);

  document.getElementById("checkAll").onclick = () => {
    let right = 0;
    fam.members.forEach((m, i) => {
      const input = tbody.querySelector(`input[data-i="${i}"]`);
      const answer = tbody.querySelectorAll(".correct-answer")[i];
      const ok = normalizeAr(input.value) === normalizeAr(m.ar);
      input.classList.remove("ok", "no");
      input.classList.add(ok ? "ok" : "no");
      if (ok) { right++; answer.style.display = "none"; }
      else { answer.style.display = "block"; answer.textContent = m.ar; }
      logEvent({ e: "fill", fam: fam.id, i, typed: input.value, ok });
      gradeCard(`fam-${fam.id}:${i}`, ok ? "good" : "again");
    });
    const score = document.getElementById("fillScore");
    score.textContent = `Score: ${right} / ${fam.members.length}` + (right === fam.members.length ? " — ممتاز! 🎉" : " — the ones in red will come back in your Review.");
    setStepDone("fam-" + fam.id, "fill");
    logEvent({ e: "fill-done", fam: fam.id, score: right, total: fam.members.length });
    autoSync();
  };
}
</script>
</body>
</html>
