<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d7a5f">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Grammar — Arabic Through Stories</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=mrqj8a22">
  <style>
    .g-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 14px; }
    .g-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 16px; cursor: pointer; transition: transform .12s;
    }
    .g-card:hover { transform: translateY(-2px); border-color: var(--accent); }
    .g-card .g-ar { font-family: var(--font-ar); font-size: 27px; color: var(--accent); direction: rtl; }
    .g-card .g-name { font-weight: 600; font-size: 14px; margin-top: 4px; }
    .g-card .meta { font-size: 12px; color: var(--muted); margin-top: 6px; }
    .gx { background: #f6f2ea; border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; margin-top: 10px; }
    .gx .x-ar { direction: rtl; text-align: right; font-family: var(--font-ar); font-size: 24px; line-height: 1.9; }
    .gx .x-en { font-size: 13.5px; color: var(--muted); }
    .gt { margin-top: 14px; border-top: 1px dashed var(--border); padding-top: 12px; }
    .gt .prompt { font-size: 14.5px; margin-bottom: 6px; }
    .gt .hint { color: var(--muted); font-style: italic; font-size: 13px; margin-inline-start: 8px; }
  </style>
</head>
<body>
<main>
  <div id="content">Loading…</div>
  <div id="kbDock"></div>
</main>

<script src="js/app.js?v=mrqj8a22"></script>
<script src="js/tracker.js?v=mrqj8a22"></script>
<script>
renderNav("grammar");
trackPage("grammar");

const content = document.getElementById("content");
let PATTERNS = null;

fetch("data/grammar.json").then(r => r.json()).then(d => {
  PATTERNS = d.patterns;
  const params = new URLSearchParams(location.search);
  if (params.get("g") === "verbears") return renderVerbEars();
  const p = PATTERNS.find(x => x.id === params.get("g"));
  if (p) renderPattern(p);
  else renderList();
});

function gDone(id) { return !!stepsDone("gr-" + id).test; }

function renderList() {
  trackPage("grammar:list");
  content.innerHTML = `
    <h1>Practical Grammar <span class="arabic" style="color:var(--accent)">قَوَاعِد عَمَلِيَّة</span></h1>
    <p class="sub">No tables to memorize. Eight patterns that carry most Quranic sentences — each taught through verses you already know, with a 1-minute test. Deeper notes appear word-by-word inside the <a href="quran.html">Quran lessons</a> (ⓘ نحو).</p>
    <div class="card" style="border-color:var(--accent);margin-bottom:16px">
      <p style="margin:0;font-size:14.5px">🎧 <a href="grammar.html?g=verbears" style="color:var(--accent);font-weight:600">Who's acting?</a> —
      hear a verb form, name the person (he / they / we / I…). For following recitation at speed, verb endings ARE the grammar. ${gDone("verbears") ? "✓ passed" : ""}</p>
    </div>
    <div class="g-grid" id="gGrid"></div>
  `;
  const grid = document.getElementById("gGrid");
  PATTERNS.forEach(p => {
    const div = document.createElement("div");
    div.className = "g-card";
    div.innerHTML = `
      <div class="g-ar">${p.ar}</div>
      <div class="g-name">${p.name}</div>
      <div class="meta">${p.examples.length} verses · ${p.test.length}-question test ${gDone(p.id) ? "· ✓ done" : ""}</div>
    `;
    div.onclick = () => { history.pushState({}, "", `grammar.html?g=${p.id}`); renderPattern(p); };
    grid.appendChild(div);
  });
}

function renderPattern(p) {
  trackPage(`grammar:${p.id}`);
  window.scrollTo({ top: 0 });
  content.innerHTML = `
    <p><a href="grammar.html" style="color:var(--accent);text-decoration:none">← All patterns</a></p>
    <h1 style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <span>${p.name}</span>
      <span class="arabic" style="color:var(--accent)" dir="rtl">${p.ar}</span>
    </h1>
    <div class="card">
      <p style="font-size:15px;margin-top:0">${p.what}</p>
      <div id="examples"></div>
    </div>
    <div class="card">
      <h2>1-minute test — type the Arabic</h2>
      <div id="testArea"></div>
      <div class="ex-row" style="margin-top:12px">
        <button class="primary" id="gCheck">✓ Check</button>
        <button class="small" id="gKb">⌨ typing box</button>
      </div>
      <div class="quiz-score" id="gScore"></div>
    </div>
  `;
  const ex = document.getElementById("examples");
  p.examples.forEach(x => {
    const div = document.createElement("div");
    div.className = "gx";
    div.innerHTML = `<div class="x-ar">${x.ar} <span class="sent-play">🔊</span></div><div class="x-en">${x.en}</div>`;
    div.querySelector(".sent-play").onclick = () => speak(x.ar, 0.8);
    ex.appendChild(div);
  });

  const ta = document.getElementById("testArea");
  let lastFocused = null;
  ta.addEventListener("focusin", e => { if (e.target.tagName === "INPUT") lastFocused = e.target; });
  ta.addEventListener("keydown", e => {
    if (e.key === "Enter") { e.preventDefault(); document.getElementById("gCheck").click(); }
  });
  p.test.forEach((t, i) => {
    const div = document.createElement("div");
    div.className = "gt";
    div.innerHTML = `
      <div class="prompt">${t.prompt}<span class="hint">${t.hint}</span></div>
      <input class="fill-input" data-i="${i}" autocomplete="off" style="max-width:260px">
      <span class="correct-answer" style="display:none"></span>
    `;
    ta.appendChild(div);
  });

  lastFocused = lastFocused || ta.querySelector("input");
  const gTarget = () => lastFocused;
  document.getElementById("gKb").onclick = () => mountTranslitDock(gTarget);
  mountTranslitDock(gTarget, true);

  // he may answer in romanization (the hint itself is shown that way). Long vowels
  // written as doubles (innā = innaa) stay significant, so إِنَّ vs إِنَّا remains honest;
  // the lax (length-forgiving) match only applies when no sibling item collides with it.
  const rom = s => String(s).toLowerCase()
    .replace(/ā/g, "aa").replace(/ī/g, "ii").replace(/ū/g, "uu")
    .normalize("NFD").replace(/[̀-ͯ]/g, "").replace(/[^a-z]/g, "");
  const lax = s => rom(s).replace(/(.)\1+/g, "$1");
  document.getElementById("gCheck").onclick = () => {
    let right = 0;
    p.test.forEach((t, i) => {
      const input = ta.querySelector(`input[data-i="${i}"]`);
      const ans = ta.querySelectorAll(".correct-answer")[i];
      let ok = normalizeAr(input.value) === normalizeAr(t.ar);
      let romOk = false;
      if (!ok && rom(input.value).length > 1) {
        romOk = rom(input.value) === rom(t.hint) ||
          (lax(input.value) === lax(t.hint) && !p.test.some((o, j) => j !== i && lax(o.hint) === lax(input.value)));
        ok = romOk;
      }
      input.classList.remove("ok", "no");
      input.classList.add(ok ? "ok" : "no");
      ans.classList.toggle("yes-note", romOk);
      if (romOk) { right++; ans.style.display = "block"; ans.textContent = t.ar; }
      else if (ok) { right++; ans.style.display = "none"; }
      else { ans.style.display = "block"; ans.textContent = t.ar; }
      logEvent({ e: "gfill", g: p.id, i, typed: input.value, ok, ...(romOk ? { rom: true } : {}) });
    });
    let scoreMsg = `Score: ${right} / ${p.test.length}` + (right === p.test.length ? " — ممتاز! 🎉" : " — re-read the pattern and try again any time.");
    if (right >= Math.ceil(p.test.length * 0.6)) {
      // pattern learnt once is pattern forgotten — its chunks join the spaced-review deck
      const added = seedCards(p.test.map((t, i) => `gt:${p.id}:${i}`));
      if (added) scoreMsg += ` These ${added} pattern chunks will now resurface in your Review on a spaced schedule.`;
    }
    document.getElementById("gScore").textContent = scoreMsg;
    setStepDone("gr-" + p.id, "test");
    logEvent({ e: "gtest-done", g: p.id, score: right, total: p.test.length });
    autoSync();
  };
}

/* ================= Who's acting? — verb endings by ear =================
   Hear a conjugated verb, name the doer. The endings (-a/-at/-ū/-nā/-tu/-ta,
   ya-/ta-/na-/a-) carry who's acting in every Quranic sentence — recognizing
   them at recitation speed matters more than any paradigm table. */
const VE_PERSONS = [
  ["he", "هُوَ"], ["she", "هِيَ"], ["they", "هُمْ"], ["we", "نَحْنُ"], ["I", "أَنَا"], ["you", "أَنْتَ"],
];
const VE_TU_TA = "The -tu/-ta pair differ only in the final vowel: ‑تُ = I, ‑تَ = you.";
const VE_VERBS = [
  { en: "said", past: { he: "قَالَ", she: "قَالَتْ", they: "قَالُوا", we: "قُلْنَا", I: "قُلْتُ", you: "قُلْتَ" },
    pres: { he: "يَقُولُ", they: "يَقُولُونَ", we: "نَقُولُ", I: "أَقُولُ", shey: "تَقُولُ" } },
  { en: "wrote", past: { he: "كَتَبَ", she: "كَتَبَتْ", they: "كَتَبُوا", we: "كَتَبْنَا", I: "كَتَبْتُ", you: "كَتَبْتَ" },
    pres: { he: "يَكْتُبُ", they: "يَكْتُبُونَ", we: "نَكْتُبُ", I: "أَكْتُبُ", shey: "تَكْتُبُ" } },
  { en: "did", past: { he: "عَمِلَ", she: "عَمِلَتْ", they: "عَمِلُوا", we: "عَمِلْنَا", I: "عَمِلْتُ", you: "عَمِلْتَ" },
    pres: { he: "يَعْمَلُ", they: "يَعْمَلُونَ", we: "نَعْمَلُ", I: "أَعْمَلُ", shey: "تَعْمَلُ" } },
  { en: "heard", past: { he: "سَمِعَ", she: "سَمِعَتْ", they: "سَمِعُوا", we: "سَمِعْنَا", I: "سَمِعْتُ", you: "سَمِعْتَ" },
    pres: { he: "يَسْمَعُ", they: "يَسْمَعُونَ", we: "نَسْمَعُ", I: "أَسْمَعُ", shey: "تَسْمَعُ" } },
  { en: "went", past: { he: "ذَهَبَ", she: "ذَهَبَتْ", they: "ذَهَبُوا", we: "ذَهَبْنَا", I: "ذَهَبْتُ", you: "ذَهَبْتَ" },
    pres: { he: "يَذْهَبُ", they: "يَذْهَبُونَ", we: "نَذْهَبُ", I: "أَذْهَبُ", shey: "تَذْهَبُ" } },
  { en: "knew", past: { he: "عَلِمَ", she: "عَلِمَتْ", they: "عَلِمُوا", we: "عَلِمْنَا", I: "عَلِمْتُ", you: "عَلِمْتَ" },
    pres: { he: "يَعْلَمُ", they: "يَعْلَمُونَ", we: "نَعْلَمُ", I: "أَعْلَمُ", shey: "تَعْلَمُ" } },
];
function veItems() {
  const items = [];
  VE_VERBS.forEach(v => {
    Object.entries(v.past).forEach(([who, ar]) => {
      const accept = who === "I" || who === "you" ? ["I", "you"] : [who];
      items.push({ ar, who: accept, en: `${who} ${v.en}`, tense: "past", note: who === "I" || who === "you" ? VE_TU_TA : "" });
    });
    const base = { said: "say", wrote: "write", did: "do", heard: "hear", went: "go", knew: "know" }[v.en];
    const third = { said: "says", wrote: "writes", did: "does", heard: "hears", went: "goes", knew: "knows" }[v.en];
    Object.entries(v.pres).forEach(([who, ar]) => {
      const accept = who === "shey" ? ["she", "you"] : [who];
      const en = who === "he" ? `he ${third}` : who === "shey" ? `she ${third} / you ${base}` : `${who} ${base}`;
      items.push({ ar, who: accept, en, tense: "present", note: who === "shey" ? "تَـ… serves both she and you — context decides." : "" });
    });
  });
  return items;
}
function renderVerbEars() {
  trackPage("grammar:verbears");
  const hasVoice = hasArabicVoice();
  const ROUNDS = 12;
  const order = veItems().sort(() => 0.5 - Math.random()).slice(0, ROUNDS);
  let pos = 0, right = 0;
  content.innerHTML = `
    <p><a href="grammar.html" style="color:var(--accent);text-decoration:none">← All patterns</a></p>
    <h1 style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <span>Who's acting?</span>
      <span class="arabic" style="color:var(--accent)" dir="rtl">مَنِ الفَاعِل؟</span>
    </h1>
    <p class="sub">${hasVoice
      ? "You'll HEAR a verb — no text. Name the doer. The ending tells you: ‑َ he · ‑َتْ she · ‑ُوا they · ‑نَا we · ‑تُ I · ‑تَ you; up front: يـ he/they · تـ she/you · نـ we · أ I."
      : "No Arabic voice on this device, so you'll READ the forms instead — the endings still tell you everything."}</p>
    <div class="card"><div class="drill-stage" id="veStage" style="text-align:center;padding:20px 0"></div></div>
  `;
  const stage = document.getElementById("veStage");
  function ask() {
    if (pos >= order.length) return finish();
    const it = order[pos];
    stage.innerHTML = `
      <div style="font-size:12px;color:var(--muted)">${pos + 1} / ${order.length} · ${it.tense}</div>
      ${hasVoice
        ? `<button class="primary" id="vePlay" style="font-size:18px;margin:12px 0">🔊 Play the verb</button>`
        : `<div class="arabic" style="font-size:34px;margin:12px 0" dir="rtl">${it.ar}</div>`}
      <div class="ex-row" style="justify-content:center;flex-wrap:wrap" id="veBtns">
        ${VE_PERSONS.map(([id, ar]) => `<button data-w="${id}" style="min-width:86px">${id} <span class="arabic" style="font-size:16px">${ar}</span></button>`).join("")}
      </div>
      <div class="drill-fb" id="veFb" style="min-height:64px;margin-top:12px;font-size:15px"></div>
    `;
    const play = document.getElementById("vePlay");
    if (play) { play.onclick = () => speak(it.ar, 0.75); speak(it.ar, 0.75); }
    document.querySelectorAll("#veBtns button").forEach(b => b.onclick = () => {
      const ok = it.who.includes(b.dataset.w);
      if (ok) right++;
      logEvent({ e: "vdrill", ar: stripTashkeel(it.ar), picked: b.dataset.w, ok });
      document.getElementById("veFb").innerHTML =
        `${ok ? '<span style="color:var(--accent);font-weight:700;font-size:18px">✓</span>' : '<span style="color:var(--red);font-weight:700;font-size:18px">✗</span>'}
         <span class="arabic" style="font-size:26px" dir="rtl">${it.ar}</span> — ${it.en}
         ${it.note ? `<div style="font-size:12.5px;color:var(--muted)">${it.note}</div>` : ""}`;
      document.querySelectorAll("#veBtns button").forEach(x => x.disabled = true);
      pos++;
      setTimeout(ask, ok ? 1100 : 2600);
    });
  }
  function finish() {
    const pass = right >= Math.ceil(order.length * 0.8);
    if (pass) setStepDone("gr-verbears", "test");
    logEvent({ e: "vdrill-done", score: right, total: order.length });
    autoSync();
    stage.innerHTML = `
      <div style="font-size:22px;font-weight:700">${right} / ${order.length} ${pass ? "— ممتاز! 🎉 Your ears know the endings." : ""}</div>
      ${pass ? "" : `<p style="font-size:14px;color:var(--muted)">80% passes. The endings: ‑َ he · ‑َتْ she · ‑ُوا they · ‑نَا we · ‑تُ I · ‑تَ you.</p>`}
      <div class="ex-row" style="justify-content:center;margin-top:10px"><button class="primary" id="veAgain">Drill again</button></div>
    `;
    document.getElementById("veAgain").onclick = renderVerbEars;
  }
  ask();
}

/* shared phonetic keyboard dock (same as Vocab Lab) */
let _kbMounted = false;
function mountKbDock(getTarget) {
  const dock = document.getElementById("kbDock");
  if (_kbMounted) { dock.firstChild.style.display = dock.firstChild.style.display === "none" ? "block" : "none"; return; }
  _kbMounted = true;
  const kbWrap = document.createElement("div");
  kbWrap.className = "card";
  kbWrap.style.padding = "10px";
  KB_LAYOUT.forEach(r => {
    const rowDiv = document.createElement("div");
    rowDiv.className = "kb-row";
    r.forEach(k => {
      const b = document.createElement("button");
      b.type = "button";
      b.innerHTML = `<span class="k-ar">${LATIN_TO_AR[k]}</span><span class="k-lat">${k}</span>`;
      b.onmousedown = (e) => e.preventDefault();
      b.onclick = () => { const t = getTarget(); if (t) { t.value += LATIN_TO_AR[k]; t.focus(); } };
      rowDiv.appendChild(b);
    });
    kbWrap.appendChild(rowDiv);
  });
  const extra = document.createElement("div");
  extra.className = "kb-row";
  const sp = document.createElement("button"); sp.innerHTML = `<span class="k-lat">space</span>`; sp.style.minWidth = "140px";
  sp.onmousedown = e => e.preventDefault(); sp.onclick = () => { const t = getTarget(); if (t) { t.value += " "; t.focus(); } };
  const del = document.createElement("button"); del.innerHTML = `<span class="k-lat">⌫</span>`;
  del.onmousedown = e => e.preventDefault(); del.onclick = () => { const t = getTarget(); if (t) { t.value = t.value.slice(0, -1); t.focus(); } };
  extra.appendChild(sp); extra.appendChild(del);
  kbWrap.appendChild(extra);
  dock.appendChild(kbWrap);
}
</script>
</body>
</html>
