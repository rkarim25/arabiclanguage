<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Review — Arabic Through Stories</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<main>
  <h1>Daily Review <span class="arabic" style="color:var(--accent)">المُرَاجَعَة اليَوْمِيَّة</span></h1>
  <p class="sub">Every word you've graded in the stories comes back here on a spaced schedule. Clear this queue daily and the vocabulary sticks.</p>
  <div class="card flash-wrap" id="reviewCard">
    <div class="flash-count" id="flashCount"></div>
    <div id="flashArea">Loading…</div>
  </div>
</main>

<script src="js/app.js"></script>
<script>
renderNav("review");

const area = document.getElementById("flashArea");
const count = document.getElementById("flashCount");

async function init() {
  const due = dueCards(); // keys like "story-01:5"
  if (due.length === 0) {
    const t = totalCards();
    area.innerHTML = t === 0
      ? `<p>Your deck is empty. Grade flashcards inside a <a href="index.html">story</a> first — they'll appear here for review.</p>`
      : `<p style="font-size:18px">✅ Nothing due right now — all ${t} words are scheduled. Come back tomorrow!</p>`;
    return;
  }

  // load vocab content for the stories involved
  const storyIds = [...new Set(due.map(k => k.split(":")[0]))];
  const stories = {};
  await Promise.all(storyIds.map(async id => { stories[id] = await loadStory(id); }));

  // shuffle deterministically enough
  const queue = due.map(k => {
    const [sid, idx] = k.split(":");
    return { key: k, v: stories[sid].vocab[parseInt(idx)] };
  }).filter(c => c.v).sort(() => 0.5 - Math.random());

  let pos = 0, again = [];
  function show() {
    if (pos >= queue.length) {
      if (again.length) {
        queue.push(...again.splice(0));
        show();
        return;
      }
      count.textContent = "";
      area.innerHTML = `<p style="font-size:18px">🎉 Review complete — ${queue.length} cards done. <span class="arabic">أَحْسَنْت!</span></p>
        <a href="index.html"><button class="primary" style="margin-top:8px">Back to stories</button></a>`;
      return;
    }
    const { key, v } = queue[pos];
    count.textContent = `${pos + 1} / ${queue.length}` + (again.length ? ` (+${again.length} to retry)` : "");
    area.innerHTML = `
      <div class="flashcard" id="card">
        <div class="front">${v.ar}</div>
        <div class="back" id="back" style="display:none">${v.en}${v.note ? `<div class="note">${v.note}</div>` : ""}</div>
        <div class="hint" id="hint">tap to reveal · 🔊 to hear</div>
      </div>
      <div class="ex-row" style="justify-content:center;margin-bottom:14px">
        <button class="small" id="hear">🔊 Hear it</button>
      </div>
      <div class="grade-row" id="grades" style="visibility:hidden">
        <button class="again">✗ Again</button>
        <button class="good">✓ Good</button>
        <button class="easy">✓✓ Easy</button>
      </div>
    `;
    document.getElementById("card").onclick = () => {
      document.getElementById("back").style.display = "block";
      document.getElementById("hint").style.display = "none";
      document.getElementById("grades").style.visibility = "visible";
    };
    document.getElementById("hear").onclick = (e) => { e.stopPropagation(); speak(v.ar, 0.8); };
    const grade = (g) => {
      gradeCard(key, g);
      if (g === "again") again.push({ key, v });
      pos++;
      show();
    };
    area.querySelector(".again").onclick = () => grade("again");
    area.querySelector(".good").onclick = () => grade("good");
    area.querySelector(".easy").onclick = () => grade("easy");
  }
  show();
}
init();
</script>
</body>
</html>
