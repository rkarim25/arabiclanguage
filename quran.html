<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d7a5f">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Quran — Arabic Through Stories</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=mri52fdd">
  <style>
    .verse-block { border-bottom: 1px dashed var(--border); padding: 18px 0; }
    .verse-block:last-child { border-bottom: none; }
    .verse-ar { direction: rtl; text-align: right; font-family: var(--font-ar); font-size: 32px; line-height: 2.1; }
    .verse-ref { color: var(--amber); font-weight: 600; font-size: 12px; }
    .verse-en { color: var(--muted); font-size: 14px; margin: 6px 0 10px; }
    .wbw { width: 100%; border-collapse: collapse; font-size: 14px; direction: rtl; }
    .wbw td { padding: 6px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
    .wbw .w-ar { font-family: var(--font-ar); font-size: 24px; white-space: nowrap; cursor: pointer; }
    .wbw .w-tr { color: var(--muted); font-style: italic; direction: ltr; text-align: left; }
    .wbw .w-en { direction: ltr; text-align: left; min-width: 130px; }
    .wbw input { width: 100%; min-width: 110px; border: 1px solid var(--border); border-radius: 8px; padding: 4px 8px; font-size: 14px; }
    .wbw input.ok { border-color: var(--accent); background: var(--accent-soft); }
    .wbw input.no { border-color: var(--red); background: var(--red-soft); }
    .wbw .true-en { display: block; color: var(--ink); font-weight: 600; font-size: 13px; }
    .wbw .true-en::before { content: "✗ "; color: var(--red); font-weight: 700; }
    .wbw .g-btn { cursor: pointer; color: var(--amber); font-size: 13px; user-select: none; }
    .wbw .g-row td { background: var(--amber-soft); font-size: 13px; direction: ltr; text-align: left; color: var(--ink); line-height: 1.5; }
    .wbw .g-row .g-root { color: var(--amber); font-weight: 600; display: block; margin-top: 4px; }
    @media (max-width: 600px) { .verse-ar { font-size: 25px; } .wbw .w-ar { font-size: 20px; } }
  </style>
</head>
<body>
<main>
  <div id="content">Loading…</div>
</main>

<script src="js/app.js?v=mri52fdd"></script>
<script src="js/tracker.js?v=mri52fdd"></script>
<script>
renderNav("quran");
trackPage("quran");

const content = document.getElementById("content");
let DATA = null;

fetch("data/verses.json").then(r => r.json()).then(d => {
  DATA = d.surahs;
  const params = new URLSearchParams(location.search);
  const s = DATA.find(x => x.id === params.get("s"));
  if (s) renderSurah(s, params.get("mode") || "study");
  else if (params.get("listen")) renderListenQueue();
  else renderList();
});

function surahDone(id, step) { return !!stepsDone("q-" + id)[step]; }

function renderList() {
  trackPage("quran:list");
  content.innerHTML = `
    <h1>Understand the Quran <span class="arabic" style="color:var(--accent)">كما يُتْلَى</span></h1>
    <p class="sub">Word-by-word surahs you hear recited constantly. Study each word, then test yourself by filling in the meanings.
    These use the Quran's highest-frequency vocabulary — every word here pays off across the whole mushaf.</p>
    <div class="card" style="border-color:var(--accent);margin-bottom:16px">
      <p style="margin:0;font-size:14.5px">🔁 <a href="quran.html?listen=1" style="color:var(--accent);font-weight:600">Listen queue</a> —
      real recitation of every surah you've studied, back to back. Zero clicks once it starts.</p>
    </div>
    <div class="story-grid" id="sGrid"></div>
    <div class="card" style="margin-top:20px">
      <p style="margin:0;font-size:13.5px;color:var(--muted)">▶ Real recitation streams a real qari (Alafasy) verse by verse; 🔊 uses your browser's voice — an approximation for studying single words.</p>
    </div>
  `;
  const grid = document.getElementById("sGrid");
  DATA.forEach(s => {
    const a = document.createElement("a");
    a.className = "story-card";
    a.href = `quran.html?s=${s.id}`;
    const words = s.verses.reduce((n, v) => n + v.words.length, 0);
    a.innerHTML = `
      <div class="num">${s.verses.length} verses · ${words} words ${surahDone(s.id, "test") ? "· ✓ tested" : surahDone(s.id, "study") ? "· studied" : ""}</div>
      <div class="title-ar">${s.name}</div>
      <div class="title-en">${s.nameEn}</div>
      <div class="meta">${s.why}</div>
    `;
    grid.appendChild(a);
  });
}

/* Listen queue: real recitation of the surahs you've already studied — repeated
   listening to KNOWN text is how recitation comprehension becomes automatic. */
function renderListenQueue() {
  trackPage("quran:listen-queue");
  const studied = DATA.filter(s => { const d = stepsDone("q-" + s.id); return d.study || d.test; });
  const queue = studied.length ? studied : [];
  content.innerHTML = `
    <p><a href="quran.html" style="color:var(--accent);text-decoration:none">← All surahs</a></p>
    <h1>Listen queue <span class="arabic" style="color:var(--accent)">اِسْتَمِعْ وَافْهَمْ</span></h1>
    <p class="sub">Real recitation (Mishary Alafasy) of the surahs you've studied, back to back.
    You already know these words — let your ears catch up with your eyes. Good while walking, commuting, or before sleep.</p>
    ${queue.length ? `
    <div class="card">
      <div class="listen-controls" style="margin-bottom:10px">
        <button class="primary" id="qPlay">▶ Play my queue (${queue.length} surah${queue.length > 1 ? "s" : ""})</button>
        <button id="qStop">■ Stop</button>
      </div>
      <div id="qList"></div>
    </div>` : `
    <div class="card">
      <p style="margin:0">Nothing in your queue yet — the queue holds surahs you've <strong>studied</strong>, so every word you hear is one you know.
      <a href="quran.html" style="color:var(--accent)">Study your first surah</a> (Al-Fatiha takes ~10 minutes) and it appears here.</p>
    </div>`}
  `;
  if (!queue.length) return;
  const list = document.getElementById("qList");
  queue.forEach((s, i) => {
    const row = document.createElement("div");
    row.id = "q-row-" + i;
    row.style.cssText = "display:flex;justify-content:space-between;gap:8px;padding:8px 10px;border-bottom:1px dashed var(--border);border-radius:8px";
    row.innerHTML = `<span>${s.nameEn.split("—")[0].trim()} <span style="color:var(--muted);font-size:12px">· ${s.verses.length} verses${stepsDone("q-" + s.id).test ? " · ✓ tested" : ""}</span></span>
      <span class="arabic" style="color:var(--accent)" dir="rtl">${s.name}</span>`;
    list.appendChild(row);
  });
  const items = [];
  queue.forEach((s, qi) => s.verses.forEach(v => items.push({ n: s.n, ayah: parseInt(v.ref.split(":")[1]), qi, sid: s.id })));
  let lastSurah = null;
  document.getElementById("qPlay").onclick = () => {
    logEvent({ e: "listen-click", title: "Listen queue" });
    playRecitation(items,
      it => {
        if (it.qi !== lastSurah) {
          if (lastSurah !== null) logEvent({ e: "rlisten", surah: items.find(x => x.qi === lastSurah).sid });
          lastSurah = it.qi;
        }
        queue.forEach((s, i) => { document.getElementById("q-row-" + i).style.background = i === it.qi ? "var(--accent-soft)" : ""; });
      },
      err => {
        queue.forEach((s, i) => { document.getElementById("q-row-" + i).style.background = ""; });
        if (!err && lastSurah !== null) logEvent({ e: "rlisten", surah: queue[lastSurah].id });
        lastSurah = null;
        if (err === "audio-failed") alert("Recitation audio didn't load — check your connection (it streams from everyayah.com).");
        autoSync();
      });
  };
  document.getElementById("qStop").onclick = () => {
    stopRecitation();
    queue.forEach((s, i) => { document.getElementById("q-row-" + i).style.background = ""; });
  };
}

/* Cold listen: the test that can't lie. Real recitation, NO text — pick the
   meaning of each verse. Passing this is what "understand as recited" means. */
function renderListenTest(s) {
  trackPage(`quran:${s.id}:listen`);
  window.scrollTo({ top: 0 });
  const allEn = DATA.flatMap(x => x.verses.map(v => v.en)).filter(Boolean);
  const order = s.verses.map((v, i) => i); // recitation order — it's a listening test, not a shuffle quiz
  let pos = 0, right = 0;
  content.innerHTML = `
    <p><a href="quran.html" style="color:var(--accent);text-decoration:none">← All surahs</a> ·
       <a href="#" id="backSurah" style="color:var(--accent);text-decoration:none">↩ ${s.nameEn.split("—")[0].trim()} lesson</a></p>
    <h1 style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <span>Cold listen 🎧</span>
      <span class="arabic" style="color:var(--accent)" dir="rtl">سُورَة ${s.name}</span>
    </h1>
    <p class="sub">No text. You hear each verse recited for real and pick its meaning. 85% certifies the surah as <strong>understood by ear</strong> — the actual goal, measured honestly.</p>
    <div class="card"><div class="drill-stage" id="clStage" style="text-align:center;padding:18px 0"></div></div>
  `;
  document.getElementById("backSurah").onclick = (e) => { e.preventDefault(); renderSurah(s, "study"); };
  const stage = document.getElementById("clStage");
  function ask() {
    if (pos >= order.length) return finish();
    const vi = order[pos];
    const v = s.verses[vi];
    const distractors = allEn.filter(e => e !== v.en).sort(() => 0.5 - Math.random()).slice(0, 3);
    const opts = [v.en, ...distractors].sort(() => 0.5 - Math.random());
    stage.innerHTML = `
      <div style="font-size:12px;color:var(--muted)">verse ${pos + 1} / ${order.length}</div>
      <button class="primary" id="clPlay" style="font-size:17px;margin:12px 0">🔊 Play the verse</button>
      <div id="clOpts" style="display:flex;flex-direction:column;gap:8px;max-width:560px;margin:0 auto">
        ${opts.map((o, i) => `<button data-i="${i}" style="text-align:left;padding:10px 14px;line-height:1.5">${o}</button>`).join("")}
      </div>
      <div class="drill-fb" id="clFb" style="min-height:52px;margin-top:12px;font-size:15px"></div>
    `;
    const playVerse = () => playRecitation([{ n: s.n, ayah: parseInt(v.ref.split(":")[1]) }], null, err => {
      if (err) document.getElementById("clFb").innerHTML = `<span style="color:var(--red);font-size:13px">Recitation needs a connection — it streams from everyayah.com.</span>`;
    });
    document.getElementById("clPlay").onclick = playVerse;
    playVerse();
    document.querySelectorAll("#clOpts button").forEach(b => b.onclick = () => {
      const ok = opts[+b.dataset.i] === v.en;
      if (ok) right++;
      logEvent({ e: "qlisten-q", surah: s.id, ref: v.ref, ok });
      document.querySelectorAll("#clOpts button").forEach(x => {
        x.disabled = true;
        if (opts[+x.dataset.i] === v.en) { x.style.borderColor = "var(--accent)"; x.style.background = "var(--accent-soft)"; }
      });
      if (!ok) { b.style.borderColor = "var(--red)"; b.style.background = "var(--red-soft)"; }
      document.getElementById("clFb").innerHTML = `${ok ? '<span style="color:var(--accent);font-weight:700">✓</span>' : '<span style="color:var(--red);font-weight:700">✗</span>'}
        <span class="arabic" style="font-size:22px" dir="rtl">${v.ar}</span>`;
      pos++;
      setTimeout(ask, ok ? 1400 : 3000);
    });
  }
  function finish() {
    stopRecitation();
    const total = order.length;
    const pass = right >= Math.ceil(total * 0.85);
    if (pass) setStepDone("q-" + s.id, "listen");
    logEvent({ e: "qlisten-test", surah: s.id, score: right, total, pass });
    autoSync();
    stage.innerHTML = `
      <div style="font-size:22px;font-weight:700">${right} / ${total} ${pass ? "— 🎧 certified by ear! ما شاء الله" : ""}</div>
      ${pass
        ? `<p style="font-size:14px;color:var(--muted)">You understood ${s.nameEn.split("—")[0].trim()} as it was recited — no text, no help. That's the real goal, measured.</p>`
        : `<p style="font-size:14px;color:var(--muted)">85% passes. Re-study the words, add it to your <a href="quran.html?listen=1" style="color:var(--accent)">Listen queue</a> for a few plays, and come back.</p>`}
      <div class="ex-row" style="justify-content:center;margin-top:10px">
        <button class="primary" id="clAgain">Try again</button>
        <button id="clBack">Back to the lesson</button>
      </div>
    `;
    document.getElementById("clAgain").onclick = () => renderListenTest(s);
    document.getElementById("clBack").onclick = () => renderSurah(s, "study");
  }
  ask();
}

function renderSurah(s, mode) {
  trackPage(`quran:${s.id}:${mode}`);
  window.scrollTo({ top: 0 });
  content.innerHTML = `
    <p><a href="quran.html" style="color:var(--accent);text-decoration:none">← All surahs</a></p>
    <h1 style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <span>${s.nameEn}</span>
      <span class="arabic" style="color:var(--accent)" dir="rtl">سُورَة ${s.name}</span>
    </h1>
    <p class="sub">${s.why}${s.n ? ` · <a href="https://rkarim25.github.io/Quran/#/${s.n}" target="_blank" style="color:var(--accent)">Read with tafsir on your Quran site ↗</a>` : ""}</p>
    <div class="steps" style="max-width:560px">
      <button id="mStudy" class="${mode === "study" ? "active" : ""}${surahDone(s.id, "study") ? " done" : ""}"><span class="ar">اُدْرُسْ</span><span>Study</span></button>
      <button id="mTest" class="${mode === "test" ? "active" : ""}${surahDone(s.id, "test") ? " done" : ""}"><span class="ar">اِخْتَبِرْ</span><span>Test meanings</span></button>
      <button id="mListen" class="${surahDone(s.id, "listen") ? "done" : ""}"><span class="ar">اِسْتَمِعْ</span><span>🎧 Cold listen</span></button>
    </div>
    <div class="card">
      <div class="listen-controls">
        <button class="primary" id="playRec">▶ Real recitation</button>
        <button id="playAll">▶ Browser voice</button>
        <button id="stopBtn">■ Stop</button>
        <label style="font-size:13px;color:var(--muted)">Voice speed <input type="range" id="rate" min="0.5" max="1.0" step="0.05" value="0.75"></label>
      </div>
      <div id="verses"></div>
      ${mode === "test" ? `<div class="ex-row" style="margin-top:14px"><button class="primary" id="checkAll">✓ Check my answers</button></div><div class="quiz-score" id="score"></div>` : `<div class="ex-row" style="margin-top:14px"><button class="primary" id="toTest">I know these — test me →</button></div>`}
    </div>
  `;
  document.getElementById("mStudy").onclick = () => renderSurah(s, "study");
  document.getElementById("mTest").onclick = () => renderSurah(s, "test");
  document.getElementById("mListen").onclick = () => renderListenTest(s);
  const rate = () => parseFloat(document.getElementById("rate").value);

  const versesEl = document.getElementById("verses");
  s.verses.forEach((v, vi) => {
    const block = document.createElement("div");
    block.className = "verse-block";
    block.innerHTML = `
      <div class="verse-ref">${v.ref}</div>
      <div class="verse-ar">${v.ar} <span class="sent-play">🔊</span></div>
      <div class="verse-en" style="display:${mode === "study" ? "block" : "none"}">${v.en}</div>
      <table class="wbw"><tbody></tbody></table>
    `;
    block.querySelector(".sent-play").onclick = () => speak(v.ar, rate());
    const tbody = block.querySelector("tbody");
    v.words.forEach((word, wi) => {
      const [ar, tr, en, grammar, root] = word;
      const row = document.createElement("tr");
      const gBtn = grammar ? `<span class="g-btn" title="grammar note">ⓘ نحو</span>` : "";
      if (mode === "study") {
        row.innerHTML = `<td class="w-ar">${ar}</td><td class="w-tr">${tr}</td><td class="w-en">${en} ${gBtn}</td>`;
      } else {
        row.innerHTML = `<td class="w-ar">${ar}</td><td class="w-tr">${tr}</td><td class="w-en"><input placeholder="meaning..." data-v="${vi}" data-w="${wi}" autocomplete="off"><span class="true-en" style="display:none"></span></td>`;
      }
      row.querySelector(".w-ar").onclick = () => { speak(ar, 0.75); logEvent({ e: "qtap", surah: s.id, ref: v.ref, w: wi }); };
      tbody.appendChild(row);
      if (grammar && mode === "study") {
        const gRow = document.createElement("tr");
        gRow.className = "g-row";
        gRow.style.display = "none";
        gRow.innerHTML = `<td colspan="3">${grammar}${root ? `<span class="g-root">root: ${root}</span>` : ""}</td>`;
        tbody.appendChild(gRow);
        row.querySelector(".g-btn").onclick = (e) => {
          e.stopPropagation();
          gRow.style.display = gRow.style.display === "none" ? "table-row" : "none";
          logEvent({ e: "gview", surah: s.id, ref: v.ref, w: wi });
        };
      }
    });
    versesEl.appendChild(block);
  });

  document.getElementById("playAll").onclick = () => {
    let i = 0;
    const next = () => {
      if (i >= s.verses.length) { logEvent({ e: "qlisten", surah: s.id }); return; }
      speak(s.verses[i].ar, rate(), () => { i++; next(); });
    };
    stopRecitation(); stopSpeak(); next();
  };
  document.getElementById("playRec").onclick = () => {
    const blocks = versesEl.querySelectorAll(".verse-block");
    const items = s.verses.map(v => ({ n: s.n, ayah: parseInt(v.ref.split(":")[1]) }));
    playRecitation(items,
      (it, i) => {
        blocks.forEach(b => b.style.background = "");
        if (blocks[i]) { blocks[i].style.background = "var(--accent-soft)"; blocks[i].scrollIntoView({ block: "center", behavior: "smooth" }); }
      },
      err => {
        blocks.forEach(b => b.style.background = "");
        if (!err) logEvent({ e: "rlisten", surah: s.id });
        else if (err === "audio-failed") alert("Recitation audio didn't load — check your connection (it streams from everyayah.com).");
      });
  };
  document.getElementById("stopBtn").onclick = () => { stopSpeak(); stopRecitation(); };

  if (mode === "study") {
    document.getElementById("toTest").onclick = () => {
      setStepDone("q-" + s.id, "study");
      renderSurah(s, "test");
    };
  } else {
    document.getElementById("checkAll").onclick = () => {
      let right = 0, total = 0;
      s.verses.forEach((v, vi) => {
        v.words.forEach(([ar, tr, en], wi) => {
          total++;
          const input = versesEl.querySelector(`input[data-v="${vi}"][data-w="${wi}"]`);
          const trueEn = input.nextElementSibling;
          const ok = fuzzyEn(input.value, en);
          input.classList.remove("ok", "no");
          input.classList.add(ok ? "ok" : "no");
          trueEn.style.display = ok ? "none" : "block";
          trueEn.textContent = en;
          if (ok) right++;
          logEvent({ e: "qfill", surah: s.id, ref: v.ref, w: wi, ar: stripTashkeel(ar), typed: input.value, ok });
          gradeCard(`qw:${s.id}:${vi}:${wi}`, ok ? "good" : "again");
        });
      });
      document.getElementById("score").textContent = `Score: ${right} / ${total}` + (right === total ? " — ما شاء الله! 🎉" : " — missed words go to your Review deck.");
      setStepDone("q-" + s.id, "test");
      logEvent({ e: "qtest-done", surah: s.id, score: right, total });
      autoSync();
    };
  }
}
</script>
</body>
</html>
