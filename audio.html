<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d7a5f">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Audio Coach — Arabic Through Stories</title>
  <link rel="stylesheet" href="css/fonts.css?v=mrrema6k">
  <link rel="stylesheet" href="css/style.css?v=mrrema6k">
  <style>
    .ac-stage {
      text-align: center; padding: 26px 16px 30px; border-radius: 18px;
      background: linear-gradient(160deg, #0d7a5f 0%, #0a5f4a 100%); color: #fff;
      min-height: 260px; display: flex; flex-direction: column; justify-content: center; gap: 8px;
    }
    .ac-status { font-size: 14px; opacity: .85; font-family: var(--font-ui); letter-spacing: .3px; min-height: 20px; }
    .ac-ar { font-family: var(--font-ar); font-size: 54px; line-height: 1.5; direction: rtl; min-height: 78px; }
    .ac-tr { font-size: 16px; opacity: .8; font-style: italic; min-height: 22px; }
    .ac-en { font-size: 26px; font-weight: 700; min-height: 34px; transition: opacity .25s; }
    .ac-en.hidden { opacity: 0; }
    .ac-note { font-size: 12.5px; opacity: .7; min-height: 18px; }
    .ac-controls { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 18px; }
    .ac-btn {
      border: none; border-radius: 14px; padding: 16px 22px; font-size: 17px; font-weight: 700;
      cursor: pointer; font-family: var(--font-ui); min-width: 96px;
    }
    .ac-btn.primary { background: var(--accent); color: #fff; padding: 18px 34px; font-size: 19px; }
    .ac-btn.ghost { background: var(--card); color: var(--ink); border: 1px solid var(--border); }
    .ac-meta { font-size: 13px; color: var(--muted); text-align: center; margin-top: 12px; }
    .ac-pill { display:inline-block; background: rgba(255,255,255,.16); border-radius: 999px; padding: 3px 12px; font-size: 12.5px; font-family: var(--font-ui); }
  </style>
</head>
<body>
<main>
  <div id="content">Loading…</div>
</main>

<script src="js/app.js?v=mrrema6k"></script>
<script src="js/tracker.js?v=mrrema6k"></script>
<script>
renderNav("audio");
trackPage("audio");

const content = document.getElementById("content");
const WORDS_PER_SENT = 6;          // a whole-sentence round every ~6 words
const RECALL_MS = 2800;            // silence to recall a word's meaning by ear
const SENT_RECALL_MS = 5000;       // sentences get more time — he asked for it

let words = [];        // [{key, v:{ar,en,tr}}]
let sents = [];        // conjugated sentences from Sentence Practice
let S = null;          // running session state
let heardLog = [];     // this session's words, unique by key — the pause/stop recap

/* ---- build a playlist customised to him: weakest & due first, but DIFFERENT
   every play. The old strict weakest-first sort replayed the identical list
   each session (listening doesn't regrade cards, so the "weakest" never
   changed). Now: weighted shuffle by weakness/dueness + randomness, and words
   already heard in the last 2 days sink to the back so replays move on. ---- */
async function buildWords() {
  const srs = getSrs();
  const now = Date.now();
  let cards = await resolveCards(Object.keys(srs));
  if (cards.length < 6) {
    // new user / empty deck: seed from everyday basics so there's always a lesson
    try {
      const groups = await fetch("data/everyday.json").then(r => r.json()).then(d => d.groups);
      const extra = [];
      groups.forEach(g => g.members.forEach(m => extra.push({ key: "ev-" + g.id, v: { ar: m.ar, en: m.en, tr: m.tr } })));
      cards = cards.concat(extra);
    } catch (e) { /* offline — go with what we have */ }
  }
  const heard = {};
  (store.get("ats-log", []) || []).forEach(e => {
    if (e.e === "alisten" && e.key && now - e.t < 2 * 864e5) heard[e.key] = (heard[e.key] || 0) + 1;
  });
  const score = c => {
    const e = srs[c.key] || { box: 1, due: now };
    return (5 - Math.min(e.box || 0, 5))            // weaker → higher
      + (e.due <= now ? 2 : 0)                      // due → higher
      + Math.random() * 4                           // variety every play
      - Math.min(heard[c.key] || 0, 3) * 2.5;       // heard recently → move on
  };
  return cards.filter(c => c.v && c.v.ar && c.v.en)
    .map(c => ({ c, s: score(c) }))
    .sort((a, b) => b.s - a.s)
    .map(x => x.c)
    .slice(0, 40);
}

/* whole sentences from Sentence Practice — real conjugations he's drilling */
async function buildSentences() {
  try {
    const d = await fetch("data/sentences.json").then(r => r.json());
    const out = [];
    d.verbs.forEach(v => d.persons.forEach(p => d.tenses.forEach(t => {
      const form = v.forms[p.key][t.key];
      const enVerb = t.key === "past" ? v.past : v.base;
      out.push({
        ar: `${form} ${v.obj.ar}`,
        en: t.key === "fut" ? `${p.en} will ${v.base} ${v.obj.en}` : `${p.en} ${enVerb} ${v.obj.en}`,
        verb: v.base, person: p.key, tense: t.key,
      });
    })));
    return out.sort(() => 0.5 - Math.random());
  } catch (e) { return []; }
}

/* ---------- cancelable audio primitives ----------
   speak() (app.js) plays the pre-generated NEURAL audio when a clip exists —
   that's the fix for the mechanical voice — and falls back to the browser. */
function speakP(text, rate) {
  return new Promise(resolve => {
    let done = false;
    const fin = () => { if (!done) { done = true; resolve(); } };
    S.cancel = () => { stopSpeak(); fin(); };
    speak(text, rate, fin);
    // mobile audio/TTS sometimes never fires onend — bound the wait
    setTimeout(fin, Math.max(3000, text.length * 200));
  });
}
function sleepP(ms) {
  return new Promise(resolve => {
    const t = setTimeout(resolve, ms);
    S.cancel = () => { clearTimeout(t); resolve(); };
  });
}
function stopAllAudio() { stopSpeak(); if (S && S.audio) { try { S.audio.pause(); } catch (e) {} S.audio = null; } }

/* ---------- wake lock: keep the screen awake on the move ---------- */
let wakeLock = null;
async function acquireWake() { try { if ("wakeLock" in navigator) wakeLock = await navigator.wakeLock.request("screen"); } catch (e) {} }
function releaseWake() { try { if (wakeLock) wakeLock.release(); } catch (e) {} wakeLock = null; }
document.addEventListener("visibilitychange", () => { if (document.visibilityState === "visible" && S && S.playing && !S.paused) acquireWake(); });

/* ---------- UI ---------- */
function setStatus(t) { const e = document.getElementById("acStatus"); if (e) e.textContent = t; }
function setWord(v, showEn) {
  const ar = document.getElementById("acAr"), tr = document.getElementById("acTr"), en = document.getElementById("acEn");
  if (ar) ar.textContent = v ? v.ar : "";
  if (tr) tr.textContent = v && v.tr ? v.tr : "";
  if (en) { en.textContent = v ? v.en : ""; en.classList.toggle("hidden", !showEn); }
}
function setCounter() {
  const c = document.getElementById("acCount");
  if (c) c.textContent = `${S.taught} word${S.taught === 1 ? "" : "s"} heard${S.sents ? ` · ${S.sents} sentence${S.sents === 1 ? "" : "s"} rebuilt` : ""}`;
}

/* ---- self-grading: his word, his call — feeds the same SRS as Review ----
   ✓ = gradeCard "good": the box rises, the due date moves out, and the
   playlist's weakness score drops — the word stops coming back until due.
   ✗ = gradeCard "again" AND the word returns a couple of beats later in
   this same session. No tap = pure listening, ungraded (unchanged). */
function showGrade(on) {
  const g = document.getElementById("acGrade");
  if (g) g.style.display = on ? "flex" : "none";
}
function gradeWord(ok) {
  if (!S || !S.current || S.graded) return;
  S.graded = true;
  gradeCard(S.current.key, ok ? "good" : "again");
  logEvent({ e: "alisten-grade", key: S.current.key, ok });
  const h = heardLog.find(x => x.key === S.current.key);
  if (h) h.g = ok ? "good" : "again";
  if (ok) {
    S.known++;
    setStatus("✓ marked known — moving on");
    S.skip = true; if (S.cancel) S.cancel(); stopAllAudio();
  } else {
    words.splice(Math.min(S.wIdx + 2, words.length), 0, S.current);
    const n = document.getElementById("acNote");
    if (n) n.textContent = "no problem — it'll come back around";
  }
  showGrade(false);
}

/* ---- pause/stop recap: mark what you had, live ----
   Grades hit the same SRS immediately. ✓ also pulls the word out of THIS
   session's remaining queue, so Resume genuinely moves on; a fresh Start
   rebuilds the playlist from the updated boxes anyway. */
function renderRecap() {
  const el = document.getElementById("acRecap");
  if (!el) return;
  if (!heardLog.length) { el.innerHTML = ""; return; }
  const rows = heardLog.slice().reverse().map(h => {
    const i = heardLog.indexOf(h);
    const b = (g, label, on, color) =>
      `<button type="button" data-i="${i}" data-g="${g}" style="border:1px solid ${on ? color : "var(--border)"};background:${on ? color : "transparent"};color:${on ? "#fff" : "var(--muted)"};border-radius:10px;padding:6px 14px;cursor:pointer;font-weight:700">${label}</button>`;
    return `<div style="display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px dashed var(--border)">
      <span class="arabic" dir="rtl" style="font-size:22px;min-width:88px;text-align:right">${h.v.ar}</span>
      <span style="flex:1;font-size:13.5px;color:var(--muted)">${h.v.en}</span>
      ${b("good", "✓", h.g === "good", "var(--accent)")}
      ${b("again", "✗", h.g === "again", "#b3402e")}
    </div>`;
  }).join("");
  el.innerHTML = `<div class="card" style="margin-top:16px;text-align:left">
    <h3 style="margin:0 0 4px;font-size:15px">This session — mark what you had</h3>
    <p style="margin:0 0 6px;font-size:12.5px;color:var(--muted)">Counts immediately, like a Review. ✓ words leave the queue; ✗ words come back sooner.</p>
    ${rows}</div>`;
  el.querySelectorAll("button").forEach(btn => btn.onclick = () => {
    const h = heardLog[+btn.dataset.i], g = btn.dataset.g;
    if (!h || h.g === g) return;
    h.g = g;
    gradeCard(h.key, g);
    logEvent({ e: "alisten-grade", key: h.key, ok: g === "good", src: "recap" });
    autoSync();
    if (g === "good" && S && words.length > 1) {
      // live: pull it from the rest of this session's queue
      words = words.filter(c => c.key !== h.key);
      S.wIdx = words.length ? S.wIdx % words.length : 0;
      if (S.known !== undefined) S.known++;
    }
    renderRecap();
  });
}

function render(state) {
  content.innerHTML = `
    <h1 style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <span>🎧 Audio Coach</span>
      <span class="arabic" style="color:var(--accent)" dir="rtl">المُدَرِّبُ الصَّوتِيّ</span>
    </h1>
    <p class="sub">Hands-free practice for the move. Listen to a word, <b>recall its meaning in the gap</b>, then hear the answer — real active recall, no typing, no tapping. Every few words: a whole <b>sentence</b> to understand, with extra thinking time. It keeps going until you stop.</p>
    <div class="ac-stage">
      <div class="ac-status" id="acStatus">${state === "ready" ? "Ready when you are" : ""}</div>
      <div class="ac-ar" id="acAr"></div>
      <div class="ac-tr" id="acTr"></div>
      <div class="ac-en hidden" id="acEn"></div>
      <div class="ac-note" id="acNote"></div>
    </div>
    <div class="ac-controls" id="acGrade" style="display:none">
      <button class="ac-btn ghost" id="acNo" style="flex:1;max-width:220px">✗ didn't have it</button>
      <button class="ac-btn primary" id="acYes" style="flex:1;max-width:220px">✓ I had it</button>
    </div>
    <div class="ac-controls" id="acControls"></div>
    <div class="ac-meta"><span id="acCount"></span></div>
    <p class="ac-meta" style="margin-top:16px">Drawn from <b>your</b> weakest and due words first, in a natural recorded voice. Best with earphones.
    Tap <b>✓ / ✗</b> when you know your verdict — it grades the word like a Review, so known words stop coming back. No tap = just listening.</p>
    <div id="acRecap"></div>
  `;
  const yes = document.getElementById("acYes"), no = document.getElementById("acNo");
  if (yes) yes.onclick = () => gradeWord(true);
  if (no) no.onclick = () => gradeWord(false);
  renderControls(state);
}

function renderControls(state) {
  const c = document.getElementById("acControls");
  if (state === "ready") {
    c.innerHTML = `<button class="ac-btn primary" id="acStart">▶ Start listening</button>`;
    document.getElementById("acStart").onclick = start;
  } else if (state === "playing") {
    c.innerHTML = `
      <button class="ac-btn ghost" id="acSkip">⏭ Skip</button>
      <button class="ac-btn primary" id="acPause">⏸ Pause</button>
      <button class="ac-btn ghost" id="acStop">⏹ Stop</button>`;
    document.getElementById("acPause").onclick = pause;
    document.getElementById("acSkip").onclick = skip;
    document.getElementById("acStop").onclick = stop;
  } else if (state === "paused") {
    c.innerHTML = `
      <button class="ac-btn ghost" id="acSkip">⏭ Skip</button>
      <button class="ac-btn primary" id="acResume">▶ Resume</button>
      <button class="ac-btn ghost" id="acStop">⏹ Stop</button>`;
    document.getElementById("acResume").onclick = resume;
    document.getElementById("acSkip").onclick = skip;
    document.getElementById("acStop").onclick = stop;
  }
}

/* ---------- the sequencer ---------- */
async function start() {
  primeSpeak();          // synchronously, inside the tap: unlocks mobile audio for the whole loop
  heardLog = [];
  setStatus("Loading your words…");
  [words, sents] = await Promise.all([buildWords(), buildSentences()]);
  if (!words.length) { setStatus("No words yet — study a little first, then come back."); return; }
  S = { playing: true, paused: false, stop: false, skip: false, i: 0, wIdx: 0, sIdx: 0, taught: 0, sents: 0, known: 0, current: null, graded: true, cancel: null, audio: null, onResume: null };
  logEvent({ e: "alisten-start", pool: words.length });
  acquireWake();
  render("playing");
  runLoop();
}

function nextWord() { const w = words[S.wIdx % words.length]; S.wIdx++; return w; }
function nextSent() { const x = sents[S.sIdx % sents.length]; S.sIdx++; return x; }

async function runLoop() {
  // opening line, once
  await speakP("Audio coach. Listen, and recall the meaning before I say it.", 1);
  while (S && !S.stop) {
    if (S.paused) { await new Promise(res => { S.onResume = res; }); continue; }
    // a word beat
    const card = nextWord();
    if (S.stop) break;
    // reset here, not only at loop bottom: a skip/✓ lands via `continue`, which
    // bypasses the bottom reset and would silently truncate every later word
    S.skip = false;
    S.current = card; S.graded = false; showGrade(true);
    // recap entry (unique per word; a returning word keeps its last verdict)
    const prev = heardLog.find(h => h.key === card.key);
    if (prev) { heardLog.splice(heardLog.indexOf(prev), 1); heardLog.push(prev); }
    else heardLog.push({ key: card.key, v: card.v, g: null });
    setWord(card.v, false);
    setStatus("Listen…"); document.getElementById("acNote").textContent = "";
    await beat(() => speakP(card.v.ar, 0.7));
    if (guard()) continue;
    setStatus("…what does it mean?"); document.getElementById("acNote").textContent = "recall it now";
    await beat(() => sleepP(RECALL_MS));
    if (guard()) continue;
    setStatus("It means:"); setWord(card.v, true); document.getElementById("acNote").textContent = "";
    await beat(() => speakP(card.v.en, 1));
    if (guard()) continue;
    await beat(() => speakP(card.v.ar, 0.7));      // hear it once more, now that you know it
    if (!S.paused && !S.skip) { S.taught++; setCounter(); logEvent({ e: "alisten", key: card.key }); }
    if (guard()) continue;
    await beat(() => sleepP(500));

    // a whole-sentence round every few words — real conjugations, extra time
    if (S.taught && S.taught % WORDS_PER_SENT === 0 && !S.skip && sents.length) {
      if (S.stop) break;
      S.current = null; showGrade(false);   // sentences aren't SRS cards — no grading
      const sent = nextSent();
      setWord({ ar: sent.ar, en: sent.en, tr: "" }, false);
      setStatus("Now a whole sentence — listen");
      await beat(() => speakP(sent.ar, 0.7));
      if (!guard()) {
        setStatus("…take your time. Who is doing it, and when?");
        document.getElementById("acNote").textContent = "whole meaning — person and tense too";
        await beat(() => sleepP(SENT_RECALL_MS));
        if (!guard()) {
          setStatus("It means:"); setWord({ ar: sent.ar, en: sent.en, tr: "" }, true);
          document.getElementById("acNote").textContent = "";
          await beat(() => speakP(sent.en, 1));
          if (!guard()) await beat(() => speakP(sent.ar, 0.7));
          if (!S.paused && !S.skip) {
            S.sents++; setCounter();
            logEvent({ e: "alisten-sent", verb: sent.verb, person: sent.person, tense: sent.tense });
          }
        }
      }
      await beat(() => sleepP(400));
    }
    S.skip = false;
  }
}

// run one cancelable step; swallow skip/pause cancellation
function beat(fn) { return fn(); }
// after a step, decide whether to restart the current word (pause) — returns true if the loop should `continue`
function guard() {
  if (S.stop) return true;
  if (S.paused) return true;   // loop will await resume, then fall through to next word
  if (S.skip) { stopAllAudio(); return true; }
  return false;
}

function pause() {
  if (!S) return;
  S.paused = true; if (S.cancel) S.cancel();
  stopAllAudio(); releaseWake();
  render("paused"); setStatus("Paused — mark the words below, or just resume"); setCounter();
  renderRecap();
}
function resume() {
  if (!S) return;
  primeSpeak();   // make sure the shared audio element is unlocked (no-op once primed)
  S.paused = false; acquireWake();
  render("playing"); setCounter();
  if (S.onResume) { const r = S.onResume; S.onResume = null; r(); }
}
function skip() { if (!S) return; S.skip = true; if (S.cancel) S.cancel(); stopAllAudio(); setStatus("Skipping…"); }
function stop() {
  if (!S) return;
  S.stop = true; S.playing = false; if (S.cancel) S.cancel();
  stopAllAudio(); releaseWake();
  logEvent({ e: "alisten-done", taught: S.taught, sents: S.sents, known: S.known }); autoSync();
  const t = S.taught, r = S.sents, k = S.known;
  render("ready");
  setStatus(t || k ? `Done — ${t} word${t === 1 ? "" : "s"} by ear${k ? `, ${k} marked known` : ""}${r ? `, ${r} sentence${r === 1 ? "" : "s"} rebuilt` : ""}. Well done. 🎧` : "Stopped.");
  S = null;
  renderRecap();
}
window.addEventListener("pagehide", () => { if (S) { S.stop = true; stopAllAudio(); releaseWake(); } });

render("ready");
</script>
</body>
</html>
